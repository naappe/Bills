<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Copy Stock Setup SQL</title>
  <style>
    :root{font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#0f172a;background:#f8fafc}*{box-sizing:border-box}body{margin:0;padding:20px}.wrap{max-width:960px;margin:0 auto}.card{background:#fff;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 1px 3px rgba(15,23,42,.08);padding:18px;margin-bottom:14px}h1{margin:0 0 8px;font-size:26px}.muted{color:#64748b;font-size:14px}.actions{display:flex;gap:10px;flex-wrap:wrap;margin:14px 0}.btn{min-height:44px;border:1px solid transparent;border-radius:12px;padding:0 16px;background:#2563eb;color:#fff;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center}.btn.secondary{background:#fff;color:#0f172a;border-color:#e2e8f0}.notice{display:none;border-radius:12px;padding:11px 13px;margin:10px 0;font-size:14px}.notice.show{display:block}.notice.ok{background:#ecfdf5;color:#166534;border:1px solid #bbf7d0}.notice.error{background:#fef2f2;color:#991b1b;border:1px solid #fecaca}textarea{width:100%;min-height:70vh;border:1px solid #cbd5e1;border-radius:12px;padding:14px;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;font-size:12px;line-height:1.45;white-space:pre}ol{padding-left:20px}li{margin:7px 0}@media(max-width:600px){body{padding:12px}.actions{display:grid}.btn{justify-content:center}textarea{min-height:58vh}}
  
/* Shared editorial cream and green theme */
:root{--bg:#f7f6f2!important;--panel:#fff!important;--ink:#17211c!important;--muted:#6b746e!important;--line:#e4e2da!important;--primary:#0f766e!important;--accent:#16a36f!important}
body{background:#f7f6f2!important;color:#17211c}h1{font-family:Georgia,"Times New Roman",serif!important;font-weight:500!important;letter-spacing:-.02em}.panel,.card,.stat,.login-card{background:#fff!important;border-color:#e4e2da!important;border-radius:18px!important;box-shadow:0 2px 10px rgba(23,33,28,.04)!important}.btn,button.primary{background:#0f766e!important}.btn.secondary{background:#fff!important;color:#17211c!important;border-color:#e4e2da!important}input,select,textarea,.field{border-color:#e4e2da!important}

</style>
  <link rel="stylesheet" href="brand-system.css">
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Stock Setup SQL</h1>
      <p class="muted">Use this page if copying from GitHub is difficult. Tap <strong>Copy SQL</strong>, then paste into Supabase SQL Editor.</p>
      <div class="actions">
        <button class="btn" id="copyBtn" type="button">Copy SQL</button>
        <a class="btn secondary" href="https://supabase.com/dashboard/project/tmupbruwmwlrmewhoodn/sql/new" target="_blank" rel="noreferrer">Open Supabase SQL Editor</a>
        <a class="btn secondary" href="stock.html">Open Stock Page</a>
      </div>
      <div class="notice" id="notice"></div>
      <ol>
        <li>Tap <strong>Copy SQL</strong>.</li>
        <li>Open Supabase SQL Editor.</li>
        <li>Paste.</li>
        <li>Press <strong>Run</strong>.</li>
      </ol>
    </section>
    <textarea id="sqlBox" readonly>Loading SQL...</textarea>
  </main>
  <script>
    const box=document.getElementById('sqlBox'),notice=document.getElementById('notice'),copyBtn=document.getElementById('copyBtn');
    function show(type,msg){notice.className=`notice show ${type}`;notice.textContent=msg}
    async function load(){try{const res=await fetch('SUPABASE_STOCK_SETUP.sql',{cache:'no-store'});if(!res.ok)throw new Error('Could not load SQL file');box.value=await res.text()}catch(e){box.value='Could not load SQL. Open SUPABASE_STOCK_SETUP.sql from GitHub.';show('error',e.message)}}
    copyBtn.addEventListener('click',async()=>{try{box.select();box.setSelectionRange(0,box.value.length);await navigator.clipboard.writeText(box.value);show('ok','Copied. Now paste it into Supabase SQL Editor and press Run.')}catch(e){document.execCommand('copy');show('ok','Selected SQL. If copy did not work, long-press inside the box and choose Copy.')}});
    load();
  </script>
</body>
</html>
