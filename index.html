function renderNewBill(){if(!state.items.length)state.items=[freshItem()];const r=state.editing||{};$('#content').innerHTML=pageHead(state.editing?'Edit bill':'New bill','Enter bill information and purchased items in one workspace.',`<button class="btn secondary" data-go="bills">Back to Bills</button>`)+`<form id="billForm"><div class="new-layout"><div class="stack"><section class="section"><div class="section-title">Bill information</div><div class="form-grid"><label class="wide">Vendor<div class="vendor-row"><div><input class="field" name="vendor" id="vendorInput" list="vendorOptions" required value="${esc(vendorVal(r))}" placeholder="Select saved vendor or type a new vendor"><div class="vendor-help">Choose an existing vendor. To add a new vendor, type the new name and save the bill.</div></div><button class="btn secondary" type="button" id="clearVendor">New vendor</button></div><datalist id="vendorOptions">${aggregateVendors(state.rows).map(v=>`<option value="${esc(v.name)}"></option>`).join('')}</datalist></label><label>Bill date<input class="field" name="bill_date" type="date" required value="${esc(toDateInput(dateVal(r))||today())}"></label><label>Due date<input class="field" name="due_date" type="date" value="${esc(toDateInput(get(r,'due_date','Due Date')))}"></label><label>Bill number<input class="field" name="bill_no" value="${esc(get(r,'bill_no','Bill No'))}"></label><label>TIN<input class="field" name="tin" value="${esc(get(r,'tin','TIN'))}"></label><label>Location<input class="field" name="location" value="${esc(get(r,'location','Location'))}"></label><label>Status<select class="field" name="payment_status">${['Pending','Paid','Cancelled'].map(x=>`<option ${statusVal(r)===x?'selected':''}>${x}</option>`).join('')}</select></label><label>Payment method<select class="field" name="payment_method">${['','Cash','Bank Transfer','Card','Credit','Other'].map(x=>`<option ${get(r,'payment_method','Payment Method')===x?'selected':''}>${x||'Not set'}</option>`).join('')}</select></label><label>Category<select class="field" name="category">${['Food & Grocery','Packaging','Utilities','Maintenance','Transport','Office','Other'].map(x=>`<option ${get(r,'category','Category')===x?'selected':''}>${x}</option>`).join('')}</select></label><label class="wide">Notes<textarea class="field" name="notes">${esc(get(r,'notes','Notes'))}</textarea></label></div></section><section class="section"><div class="card-head"><strong>Bill items</strong><button class="btn secondary small" type="button" id="addItem">＋ Add row</button></div><div class="table-wrap"><table class="items-table"><thead><tr><th>Product / description</th><th>Qty</th><th>Unit</th><th>Rate</th><th>GST %</th><th>Total</th><th></th></tr></thead><tbody id="itemRows"></tbody></table></div></section></div><aside class="summary"><h3>Bill summary</h3><div class="sum-row"><span>Items</span><strong id="sumItems">0</strong></div><div class="sum-row"><span>Subtotal</span><strong id="sumSubtotal">MVR 0.00</strong></div><div class="sum-row"><span>GST</span><strong id="sumGst">MVR 0.00</strong></div><div class="sum-row grand"><span>Grand total</span><strong id="sumGrand">MVR 0.00</strong></div><button class="btn" type="submit">${state.editing?'Update Bill':'Save Bill'}</button><div id="saveNotice" style="margin-top:10px;font-size:12px;color:#b9f7df"></div></aside></div></form>`;bindGo();renderItemRows();$('#addItem').onclick=()=>{state.items.push(freshItem());renderItemRows()};const clearVendor=$('#clearVendor');if(clearVendor)clearVendor.onclick=()=>{const i=$('#vendorInput');i.value='';i.focus()};$('#billForm').onsubmit=saveBill}
function renderItemRows(){const body=$('#itemRows');if(!body)return;body.innerHTML=state.items.map((it,i)=>`<tr><td><input class="field product" data-i="${i}" data-k="description" value="${esc(it.description)}" placeholder="Product name"></td><td><input class="field" data-i="${i}" data-k="qty" type="number" min="0" step="any" value="${num(it.qty)}"></td><td><select class="field" data-i="${i}" data-k="unit">${['PCS','KG','G','L','ML','PKT','BOX','CTN','DOZ','BAG','BOTTLE','CAN','TIN','ROLL','SET','PAIR'].map(x=>`<option ${it.unit===x?'selected':''}>${x}</option>`).join('')}</select></td><td><input class="field" data-i="${i}" data-k="rate" type="number" min="0" step="any" value="${num(it.rate)}"></td><td><input class="field" data-i="${i}" data-k="gst" type="number" min="0" step="any" value="${num(it.gst)}"></td><td><strong>${money(itemTotal(it))}</strong></td><td><button class="btn danger small" type="button" data-remove="${i}">×</button></td></tr>`).join('');$$('#itemRows [data-i]').forEach(el=>el.oninput=()=>{const i=+el.dataset.i,k=el.dataset.k;state.items[i][k]=['qty','rate','gst'].includes(k)?num(el.value):el.value;renderItemRows()});$$('[data-remove]').forEach(b=>b.onclick=()=>{state.items.splice(+b.dataset.remove,1);if(!state.items.length)state.items=[freshItem()];renderItemRows()});updateSummary()}
const itemSubtotal=i=>num(i.qty)*num(i.rate),itemTotal=i=>itemSubtotal(i)*(1+num(i.gst)/100);function updateSummary(){const sub=state.items.reduce((s,i)=>s+itemSubtotal(i),0),grand=state.items.reduce((s,i)=>s+itemTotal(i),0);$('#sumItems').textContent=state.items.filter(i=>i.description||num(i.rate)).length;$('#sumSubtotal').textContent=money(sub);$('#sumGst').textContent=money(grand-sub);$('#sumGrand').textContent=money(grand)}
async function saveBill(e){e.preventDefault();const f=new FormData(e.currentTarget),sub=state.items.reduce((s,i)=>s+itemSubtotal(i),0),grand=state.items.reduce((s,i)=>s+itemTotal(i),0),payload={vendor:f.get('vendor'),bill_date:f.get('bill_date'),due_date:f.get('due_date')||null,bill_no:f.get('bill_no')||'',tin:f.get('tin')||'',location:f.get('location')||'',payment_status:f.get('payment_status'),payment_method:f.get('payment_method')||'',category:f.get('category'),notes:f.get('notes')||'',amount:grand,subtotal:sub,gst_total:grand-sub,items:state.items};$('#saveNotice').textContent='Saving…';let query=state.editing?db.from(TABLE).update(payload).eq('id',state.editing.id):db.from(TABLE).insert(payload);let {error}=await query;if(error){const safe={vendor:payload.vendor,bill_date:payload.bill_date,amount:payload.amount,payment_status:payload.payment_status,payment_method:payload.payment_method,notes:payload.notes};({error}=await(state.editing?db.from(TABLE).update(safe).eq('id',state.editing.id):db.from(TABLE).insert(safe)))}if(error){$('#saveNotice').textContent=error.message;return}state.editing=null;state.items=[];await loadBills();show('bills')}
function parseItems(r){const raw=get(r,'items','line_items','bill_items');if(Array.isArray(raw))return raw;if(typeof raw==='string')try{return JSON.parse(raw)}catch{}return[]}
function editBill(id){const r=state.rows.find(x=>String(x.id)===String(id));state.editing=r;state.items=parseItems(r).length?parseItems(r):[{description:get(r,'description','item','product')||'',qty:1,unit:'PCS',rate:amountVal(r),gst:0}];show('new')}
async function deleteBill(id){if(!confirm('Move this bill to Trash?'))return;const {error}=await db.from(TABLE).delete().eq('id',id);if(error)return alert(error.message);await loadBills();renderBills()}
function aggregateVendors(rows=state.rows){const m={};rows.forEach(r=>{const n=vendorVal(r)||'Unknown';m[n]??={name:n,total:0,count:0,last:null};m[n].total+=amountVal(r);m[n].count++;const d=new Date(dateVal(r));if(!m[n].last||d>m[n].last)m[n].last=d});return Object.values(m).sort((a,b)=>b.total-a.total)}
function aggregateProducts(){const m={};state.rows.forEach(r=>parseItems(r).forEach(i=>{const n=i.description||i.product||i.name;if(!n)return;m[n]??={name:n,count:0,total:0,lastRate:0,min:Infinity,max:0,unit:i.unit||''};const rate=num(i.rate);m[n].count++;m[n].total+=num(i.qty)*rate;m[n].lastRate=rate;if(rate){m[n].min=Math.min(m[n].min,rate);m[n].max=Math.max(m[n].max,rate)}}));return Object.values(m).sort((a,b)=>b.total-a.total)}
function renderProducts(){const p=aggregateProducts();$('#content').innerHTML=pageHead('Products','Products discovered from saved bill items.',`<button class="btn" data-go="new">＋ New Bill</button>`)+`<section class="card"><div class="card-head"><strong>${p.length} products</strong></div><div class="table-wrap"><table><thead><tr><th>Product</th><th>Unit</th><th>Purchases</th><th>Latest rate</th><th>Lowest</th><th>Highest</th><th>Total spend</th></tr></thead><tbody>${p.map(x=>`<tr><td><strong>${esc(x.name)}</strong></td><td>${esc(x.unit||'-')}</td><td>${x.count}</td><td>${money(x.lastRate)}</td><td>${x.min===Infinity?'-':money(x.min)}</td><td>${money(x.max)}</td><td>${money(x.total)}</td></tr>`).join('')||`<tr><td colspan="7"><div class="empty">Save bills with item rows to build the product catalogue.</div></td></tr>`}</tbody></table></div></section>`;bindGo()}
function renderVendors(){const v=aggregateVendors();$('#content').innerHTML=pageHead('Vendors','Supplier profiles generated from purchasing history.',`<button class="btn" data-go="new">＋ New Bill</button>`)+`<section class="card"><div class="table-wrap"><table><thead><tr><th>Vendor</th><th>Bills</th><th>Total purchases</th><th>Average bill</th><th>Last purchase</th></tr></thead><tbody>${v.map(x=>`<tr><td><strong>${esc(x.name)}</strong></td><td>${x.count}</td><td>${money(x.total)}</td><td>${money(x.total/x.count)}</td><td>${x.last?fmt(x.last):'-'}</td></tr>`).join('')||`<tr><td colspan="5"><div class="empty">No vendor history yet.</div></td></tr>`}</tbody></table></div></section>`;bindGo()}
function renderPrices(){const p=aggregateProducts();$('#content').innerHTML=pageHead('Price Book','Latest, lowest and highest recorded product rates.')+`<section class="card"><div class="table-wrap"><table><thead><tr><th>Product</th><th>Unit</th><th>Current rate</th><th>Lowest rate</th><th>Highest rate</th><th>Range</th></tr></thead><tbody>${p.map(x=>`<tr><td><strong>${esc(x.name)}</strong></td><td>${esc(x.unit||'-')}</td><td>${money(x.lastRate)}</td><td>${x.min===Infinity?'-':money(x.min)}</td><td>${money(x.max)}</td><td>${x.min===Infinity?'-':money(x.max-x.min)}</td></tr>`).join('')||`<tr><td colspan="6"><div class="empty">No item-level price data found.</div></td></tr>`}</tbody></table></div></section>`}
function renderReports(){const all=metricData(),month=metricData(state.rows.filter(thisMonth)),vendors=aggregateVendors();$('#content').innerHTML=pageHead('Reports','Operational purchasing summaries ready for export.',`<button class="btn secondary" id="exportReport">Export CSV</button>`)+`<section class="metrics"><article class="metric brand"><small>All-time spend</small><strong>${money(all.total)}</strong></article><article class="metric"><small>Total bills</small><strong>${all.count}</strong></article><article class="metric"><small>This month</small><strong>${money(month.total)}</strong></article><article class="metric"><small>Vendors</small><strong>${vendors.length}</strong></article></section><div class="grid-2"><section class="card"><div class="card-head"><strong>Vendor spend</strong></div><div class="card-body rank">${vendors.slice(0,10).map(v=>`<div class="rank-row"><b>${esc(v.name)}</b><strong>${money(v.total)}</strong></div>`).join('')}</div></section><section class="card"><div class="card-head"><strong>Payment status</strong></div><div class="card-body"><div class="mini-grid"><div class="kpi"><small>Paid</small><strong>${all.paid}</strong></div><div class="kpi"><small>Pending</small><strong>${all.pending}</strong></div><div class="kpi"><small>Other</small><strong>${all.count-all.paid-all.pending}</strong></div></div></div></section></div>`;$('#exportReport').onclick=exportCsv}
function renderSettings(){$('#content').innerHTML=pageHead('Settings','Application and account information.')+`<div class="settings-grid"><section class="card"><div class="card-head"><strong>Account</strong></div><div class="card-body stack"><label>Email<input class="field" value="${esc(state.user?.email||'')}" disabled></label><label>Role<input class="field" value="${esc(state.role)}" disabled></label></div></section><section class="card"><div class="card-head"><strong>Application</strong></div><div class="card-body stack"><label>Currency<input class="field" value="MVR" disabled></label><label>Default GST<input class="field" value="8%" disabled></label><div class="muted" style="font-size:12px">White Saffron Procurement ERP v3 · GitHub Pages + Supabase</div></div></section></div>`}
function exportCsv(){const cols=['Date','Vendor','Bill Number','Status','Payment Method','Amount'];const rows=state.filtered.length?state.filtered:state.rows;const csv=[cols.join(','),...rows.map(r=>[dateVal(r),vendorVal(r),get(r,'bill_no','Bill No'),statusVal(r),get(r,'payment_method','Payment Method'),amountVal(r)].map(v=>`"${String(v??'').replace(/"/g,'""')}"`).join(','))].join('\n');const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download='bills-export.csv';a.click();URL.revokeObjectURL(a.href)}
function bindGo(){$$('[data-go]').forEach(b=>b.onclick=()=>{if(b.dataset.go!=='new'){state.editing=null;state.items=[]}show(b.dataset.go)})}
const today=()=>new Date().toISOString().slice(0,10);function toDateInput(v){if(!v)return'';const d=new Date(v);return isNaN(d)?'':d.toISOString().slice(0,10)}
async function loadBills(){let {data,error}=await db.from(TABLE).select('*').order('id',{ascending:false}).limit(5000);if(error){({data,error}=await db.from(TABLE).select('*').limit(5000))}if(error)throw error;state.rows=data||[];state.filtered=[...state.rows]}
async function boot(session){if(!session){$('#loginView').classList.remove('hidden');$('#appView').classList.add('hidden');return}state.user=session.user;state.role=ADMIN_IDS.includes(session.user.id)?'admin':'staff';$('#loginView').classList.add('hidden');$('#appView').classList.remove('hidden');$('#roleLabel').textContent=state.role.toUpperCase();$('#emailLabel').textContent=session.user.email||'Signed in';$('#avatar').textContent=(session.user.email||'A')[0].toUpperCase();try{await loadBills();show('dashboard')}catch(e){$('#content').innerHTML=`<div class="card"><div class="empty">Could not load bills: ${esc(e.message)}</div></div>`}}
$('#loginForm').onsubmit=async e=>{e.preventDefault();$('#loginNotice').textContent='Signing in…';const name=$('#loginName').value.trim().toLowerCase(),email=LOGIN[name]||name;const {data,error}=await db.auth.signInWithPassword({email,password:$('#loginPassword').value});if(error){$('#loginNotice').textContent=error.message;return}$('#loginNotice').textContent='';boot(data.session)};
$('#logoutBtn').onclick=async()=>{await db.auth.signOut();location.reload()};$('#menuBtn').onclick=()=>$('#sidebar').classList.toggle('open');$$('.nav button[data-view]').forEach(b=>b.onclick=()=>{if(b.dataset.view!=='new'){state.editing=null;state.items=[]}show(b.dataset.view)});db.auth.getSession().then(({data})=>boot(data.session));db.auth.onAuthStateChange((_e,s)=>{if(!s)boot(null)});
</script>
