<style>
:root{--bg:#eef4fb;--surface:#ffffff;--surface-2:#f6f9fd;--ink:#051c33;--muted:#607086;--line:#dbe5f0;--brand:#0066ff;--brand-2:#00a982;--brand-soft:#eaf3ff;--amber:#f4a340;--red:#d64a55;--shadow:0 10px 30px rgba(5,28,51,.08);--radius:16px}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;font-family:Inter,system-ui,sans-serif;background:var(--bg);color:var(--ink)}button,input,select,textarea{font:inherit}button{cursor:pointer}.hidden{display:none!important}
.login{min-height:100vh;display:grid;place-items:center;padding:24px;background:radial-gradient(circle at top left,#dceaff,transparent 38%),linear-gradient(135deg,#f4f8fd,#eaf1f9)}.login-card{width:min(420px,100%);background:var(--surface);border:1px solid var(--line);border-radius:24px;padding:32px;box-shadow:var(--shadow)}.mark{width:52px;height:52px;border-radius:16px;display:grid;place-items:center;background:linear-gradient(135deg,var(--brand),var(--brand-2));color:white;font-weight:800;margin-bottom:18px}.login h1{margin:0 0 8px;font-size:28px}.muted{color:var(--muted)}.stack{display:grid;gap:12px}.notice{min-height:20px;font-size:13px;color:var(--red)}
.app{min-height:100vh;display:grid;grid-template-columns:248px minmax(0,1fr)}.sidebar{position:sticky;top:0;height:100vh;background:linear-gradient(180deg,#071f3a,#0a2b4f);color:#edf5ff;padding:18px 14px;display:flex;flex-direction:column}.brand{display:flex;align-items:center;gap:11px;padding:8px 10px 20px}.brand-badge{width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:#00d084;color:#052b25;font-weight:900}.brand strong{display:block}.brand small{color:#a9bfd6}.nav{display:grid;gap:5px}.nav button{border:0;background:transparent;color:#bfd0e2;text-align:left;padding:11px 12px;border-radius:11px;display:flex;align-items:center;gap:10px;font-weight:650}.nav button:hover,.nav button.active{background:rgba(255,255,255,.11);color:#fff}.nav .primary{background:#00d084;color:#052b25}.nav .primary:hover,.nav .primary.active{background:#1f78ff;color:#ffffff}.side-foot{margin-top:auto;padding:12px 8px;border-top:1px solid rgba(255,255,255,.12)}
.main{min-width:0}.topbar{height:68px;border-bottom:1px solid var(--line);background:rgba(255,255,255,.9);backdrop-filter:blur(12px);display:flex;align-items:center;justify-content:space-between;padding:0 28px;position:sticky;top:0;z-index:10}.topbar-title{font-weight:800}.user{display:flex;align-items:center;gap:10px}.avatar{width:36px;height:36px;border-radius:50%;display:grid;place-items:center;background:var(--brand-soft);color:var(--brand);font-weight:800}.content{padding:28px;max-width:1600px;margin:auto}.page-head{display:flex;align-items:flex-start;justify-content:space-between;gap:16px;margin-bottom:20px}.page-head h1{margin:0 0 5px;font-size:28px;letter-spacing:-.03em}.actions{display:flex;gap:9px;flex-wrap:wrap}
.btn{border:1px solid transparent;border-radius:10px;min-height:40px;padding:0 15px;font-weight:750;background:var(--brand);color:white;display:inline-flex;align-items:center;justify-content:center;gap:8px}.btn:hover{filter:brightness(.96)}.btn.secondary{background:var(--surface);color:var(--ink);border-color:var(--line)}.btn.danger{background:#fff3f3;color:var(--red);border-color:#f0caca}.btn.small{min-height:34px;padding:0 11px;font-size:12px}.field{width:100%;min-height:40px;border:1px solid #cad8d1;border-radius:10px;background:#fff;padding:0 11px;color:var(--ink);outline:none}.field:focus{border-color:var(--brand-2);box-shadow:0 0 0 3px rgba(0,102,255,.14)}textarea.field{padding:10px;min-height:76px;resize:vertical}label{display:grid;gap:6px;font-size:12px;font-weight:750;color:#4f5e58}
.metrics{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin-bottom:18px}.metric{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:17px;box-shadow:0 4px 16px rgba(28,55,45,.04)}.metric small{display:block;color:var(--muted);font-weight:650;margin-bottom:8px}.metric strong{font-size:24px;letter-spacing:-.03em}.metric.brand{background:linear-gradient(135deg,#0066ff,#3987ff);color:#fff;border:0}.metric.brand small{color:#dceaff}
.card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);box-shadow:0 4px 16px rgba(28,55,45,.04)}.card-head{padding:15px 17px;border-bottom:1px solid var(--line);display:flex;justify-content:space-between;align-items:center;gap:12px}.card-body{padding:17px}.grid-2{display:grid;grid-template-columns:1.2fr .8fr;gap:16px}.toolbar{display:grid;grid-template-columns:1fr 180px 180px 220px;gap:9px;padding:13px;background:var(--surface-2);border-bottom:1px solid var(--line)}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;min-width:860px}th{font-size:11px;text-transform:uppercase;letter-spacing:.05em;text-align:left;color:#718079;background:#f7faf8;padding:11px 13px;border-bottom:1px solid var(--line)}td{padding:12px 13px;border-bottom:1px solid #e8eeeb;font-size:13px}tbody tr:hover{background:#fbfdfc}.pill{display:inline-flex;align-items:center;border-radius:999px;padding:5px 9px;font-size:11px;font-weight:800;background:#eef2f0;color:#59675f}.pill.paid{background:#e4f5ed;color:#0d744f}.pill.pending{background:#fff3dc;color:#9b6412}.pill.cancelled{background:#fdeaea;color:#a93d3d}.empty{padding:42px;text-align:center;color:var(--muted)}.pager{display:flex;justify-content:space-between;align-items:center;padding:12px 15px}.rank{display:grid;gap:10px}.rank-row{display:flex;justify-content:space-between;gap:12px;padding:11px 12px;background:var(--surface-2);border-radius:11px}.rank-row b{font-size:13px}.rank-row span{font-size:12px;color:var(--muted)}
.new-layout{display:grid;grid-template-columns:minmax(0,1fr) 310px;gap:16px;align-items:start}.section{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}.section-title{padding:14px 16px;border-bottom:1px solid var(--line);font-weight:800}.form-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:11px;padding:15px}.form-grid .wide{grid-column:span 2}.items-table input,.items-table select{min-width:90px}.items-table .product{min-width:220px}.summary{position:sticky;top:86px;background:linear-gradient(180deg,#071f3a,#0a3158);color:#fff;border-radius:var(--radius);padding:18px;box-shadow:var(--shadow)}.summary h3{margin:0 0 16px}.sum-row{display:flex;justify-content:space-between;padding:9px 0;color:#c9d9e9}.sum-row.grand{border-top:1px solid rgba(255,255,255,.2);margin-top:6px;padding-top:15px;color:white;font-size:18px;font-weight:800}.summary .btn{width:100%;margin-top:16px;background:#00d084;color:#052b25}.mini-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.kpi{padding:14px;background:var(--surface-2);border-radius:12px}.kpi small{display:block;color:var(--muted);margin-bottom:5px}.kpi strong{font-size:18px}.settings-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:16px}.mobile-menu{display:none}
@media(max-width:1050px){.metrics{grid-template-columns:repeat(2,1fr)}.grid-2,.new-layout{grid-template-columns:1fr}.summary{position:static}.toolbar{grid-template-columns:1fr 1fr}.form-grid{grid-template-columns:repeat(2,1fr)}}

</style>
