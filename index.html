<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Bills Tracker</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      --bg: #f6f7fb;
      --panel: #ffffff;
      --text: #101828;
      --muted: #667085;
      --line: #e4e7ec;
      --brand: #13715b;
      --brand-2: #0f5d4b;
      --danger: #b42318;
      --warning: #b54708;
      --shadow: 0 10px 28px rgba(16, 24, 40, .08);
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body { margin: 0; background: var(--bg); color: var(--text); }
    button, input, select { font: inherit; }

    .app { max-width: 1180px; margin: 0 auto; padding: 22px; }
    header { display: flex; align-items: flex-start; justify-content: space-between; gap: 16px; margin-bottom: 18px; }
    h1 { margin: 0; font-size: 26px; letter-spacing: 0; }
    .sub { margin: 6px 0 0; color: var(--muted); font-size: 14px; }

    .actions { display: flex; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .btn { border: 0; background: var(--brand); color: #fff; min-height: 40px; padding: 0 14px; border-radius: 8px; cursor: pointer; font-weight: 700; }
    .btn:hover { background: var(--brand-2); }
    .btn.secondary { background: #fff; color: var(--text); border: 1px solid var(--line); }
    .btn.danger { background: var(--danger); }

    .stats { display: grid; grid-template-columns: repeat(4, minmax(0, 1fr)); gap: 12px; margin-bottom: 14px; }
    .stat { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 14px; box-shadow: var(--shadow); }
    .label { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .value { margin-top: 8px; font-size: 24px; font-weight: 800; }

    .toolbar { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; padding: 12px; display: grid; grid-template-columns: 1fr 170px 150px; gap: 10px; margin-bottom: 14px; box-shadow: var(--shadow); }
    .field { min-height: 42px; border: 1px solid var(--line); border-radius: 8px; padding: 0 12px; background: #fff; color: var(--text); width: 100%; }

    .notice { display: none; border-radius: 8px; padding: 12px 14px; margin-bottom: 14px; border: 1px solid var(--line); background: #fff; color: var(--muted); }
    .notice.error { display: block; border-color: #fecdca; background: #fffbfa; color: var(--danger); }
    .notice.warn { display: block; border-color: #fedf89; background: #fffcf5; color: var(--warning); }
    .notice.ok { display: block; border-color: #abefc6; background: #f6fef9; color: var(--brand-2); }

    .panel { background: var(--panel); border: 1px solid var(--line); border-radius: 8px; overflow: hidden; box-shadow: var(--shadow); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 14px; border-bottom: 1px solid var(--line); text-align: left; font-size: 14px; vertical-align: top; }
    th { color: var(--muted); font-size: 12px; text-transform: uppercase; background: #fcfcfd; }
    tr:last-child td { border-bottom: 0; }
    .amount { text-align: right; font-weight: 800; white-space: nowrap; }
    .muted { color: var(--muted); }
    .empty { padding: 36px; text-align: center; color: var(--muted); }

    dialog { width: min(620px, calc(100% - 24px)); border: 0; border-radius: 8px; padding: 0; box-shadow: 0 24px 80px rgba(16, 24, 40, .25); }
    dialog::backdrop { background: rgba(16, 24, 40, .42); }
    .modal-head, .modal-foot { padding: 16px; border-bottom: 1px solid var(--line); display: flex; align-items: center; justify-content: space-between; gap: 12px; }
    .modal-foot { border-top: 1px solid var(--line); border-bottom: 0; justify-content: flex-end; }
    .modal-body { padding: 16px; display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 12px; }
    .modal-body label { display: grid; gap: 6px; font-size: 13px; color: var(--muted); font-weight: 700; }
    .full { grid-column: 1 / -1; }

    @media (max-width: 760px) {
      .app { padding: 14px; }
      header { display: block; }
      .actions { justify-content: stretch; margin-top: 12px; }
      .btn { flex: 1; }
      .stats { grid-template-columns: repeat(2, minmax(0, 1fr)); }
      .toolbar { grid-template-columns: 1fr; }
      table, thead, tbody, tr, th, td { display: block; }
      thead { display: none; }
      tr { padding: 12px; border-bottom: 1px solid var(--line); }
      td { border: 0; padding: 5px 0; }
      td::before { content: attr(data-label); display: block; color: var(--muted); font-size: 11px; font-weight: 800; text-transform: uppercase; margin-bottom: 2px; }
      .amount { text-align: left; }
      .modal-body { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main class="app">
    <header>
      <div>
        <h1>Bills Tracker</h1>
        <p class="sub">Connected to Supabase table <strong>bills</strong>.</p>
      </div>
      <div class="actions">
        <button class="btn secondary" id="refreshBtn">Refresh</button>
        <button class="btn" id="addBtn">Add Bill</button>
      </div>
    </header>

    <section class="stats">
      <div class="stat"><div class="label">Bills</div><div class="value" id="totalCount">0</div></div>
      <div class="stat"><div class="label">Total MVR</div><div class="value" id="totalAmount">0.00</div></div>
      <div class="stat"><div class="label">Male</div><div class="value" id="maleAmount">0.00</div></div>
      <div class="stat"><div class="label">Villimale</div><div class="value" id="villimaleAmount">0.00</div></div>
    </section>

    <section class="toolbar">
      <input class="field" id="searchInput" placeholder="Search vendor, bill no, location, TIN">
      <select class="field" id="locationFilter"><option value="">All locations</option></select>
      <select class="field" id="dateFilter">
        <option value="all">All dates</option>
        <option value="today">Today</option>
        <option value="week">This week</option>
        <option value="month">This month</option>
      </select>
    </section>

    <div class="notice" id="notice"></div>

    <section class="panel">
      <table>
        <thead>
          <tr>
            <th>Date</th>
            <th>Vendor</th>
            <th>Bill No</th>
            <th>Location</th>
            <th>TIN</th>
            <th class="amount">Amount</th>
          </tr>
        </thead>
        <tbody id="billRows"></tbody>
      </table>
      <div class="empty" id="emptyState">Loading bills...</div>
    </section>
  </main>

  <dialog id="billDialog">
    <form method="dialog" id="billForm">
      <div class="modal-head">
        <strong>Add Bill</strong>
        <button class="btn secondary" value="cancel" type="button" id="closeDialog">Close</button>
      </div>
      <div class="modal-body">
        <label>Bill Date<input class="field" name="bill_date" placeholder="25/11/2025"></label>
        <label>Vendor<input class="field" name="vendor" required></label>
        <label>Amount<input class="field" name="amount" required inputmode="decimal"></label>
        <label>Bill No<input class="field" name="bill_no"></label>
        <label>Location<input class="field" name="location"></label>
        <label>TIN<input class="field" name="tin"></label>
      </div>
      <div class="modal-foot">
        <button class="btn secondary" type="button" id="cancelBtn">Cancel</button>
        <button class="btn" type="submit">Save</button>
      </div>
    </form>
  </dialog>

  <script>
    const SUPABASE_URL = 'https://tmupbruwmwlrmewhoodn.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_LAn1liS2zqMqlB33IQJxIw_NbgWKix1';
    const TABLE_NAME = 'bills';

    const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const state = { rows: [], filtered: [] };

    const els = {
      rows: document.getElementById('billRows'),
      empty: document.getElementById('emptyState'),
      notice: document.getElementById('notice'),
      search: document.getElementById('searchInput'),
      location: document.getElementById('locationFilter'),
      date: document.getElementById('dateFilter'),
      totalCount: document.getElementById('totalCount'),
      totalAmount: document.getElementById('totalAmount'),
      maleAmount: document.getElementById('maleAmount'),
      villimaleAmount: document.getElementById('villimaleAmount'),
      dialog: document.getElementById('billDialog'),
      form: document.getElementById('billForm')
    };

    function getValue(row, normalKey, csvKey) {
      return row[normalKey] ?? row[csvKey] ?? '';
    }

    function cleanAmount(value) {
      const match = String(value || '').replace(/,/g, '').match(/-?\d+(?:\.\d+)?/);
      return match ? Number(match[0]) : 0;
    }

    function formatMoney(value) {
      return cleanAmount(value).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    function showNotice(type, message) {
      els.notice.className = `notice ${type}`;
      els.notice.textContent = message;
    }

    function normalizeForInsert(formData) {
      return {
        'Bill Date': formData.get('bill_date') || null,
        Vendor: formData.get('vendor') || '',
        Amount: formData.get('amount') || '0',
        'Bill No': formData.get('bill_no') || '',
        Location: formData.get('location') || '',
        TIN: formData.get('tin') || ''
      };
    }

    function rowSearchText(row) {
      return [
        getValue(row, 'vendor', 'Vendor'),
        getValue(row, 'bill_no', 'Bill No'),
        getValue(row, 'location', 'Location'),
        getValue(row, 'tin', 'TIN')
      ].join(' ').toLowerCase();
    }

    function passesDateFilter(row) {
      const filter = els.date.value;
      if (filter === 'all') return true;
      const raw = getValue(row, 'bill_date', 'Bill Date');
      if (!raw) return false;
      const parts = String(raw).includes('/') ? String(raw).split('/') : null;
      const date = parts ? new Date(parts[2], Number(parts[1]) - 1, parts[0]) : new Date(raw);
      if (Number.isNaN(date.getTime())) return false;
      const now = new Date();
      if (filter === 'today') return date.toDateString() === now.toDateString();
      if (filter === 'month') return date.getMonth() === now.getMonth() && date.getFullYear() === now.getFullYear();
      if (filter === 'week') {
        const start = new Date(now);
        start.setDate(now.getDate() - now.getDay());
        start.setHours(0, 0, 0, 0);
        return date >= start && date <= now;
      }
      return true;
    }

    function applyFilters() {
      const q = els.search.value.trim().toLowerCase();
      const loc = els.location.value;
      state.filtered = state.rows.filter(row => {
        const location = getValue(row, 'location', 'Location');
        return (!q || rowSearchText(row).includes(q)) && (!loc || location === loc) && passesDateFilter(row);
      });
      render();
    }

    function renderLocations() {
      const selected = els.location.value;
      const locations = [...new Set(state.rows.map(row => getValue(row, 'location', 'Location')).filter(Boolean))].sort();
      els.location.innerHTML = '<option value="">All locations</option>' + locations.map(loc => `<option value="${escapeHtml(loc)}">${escapeHtml(loc)}</option>`).join('');
      els.location.value = selected;
    }

    function renderStats() {
      const total = state.filtered.reduce((sum, row) => sum + cleanAmount(getValue(row, 'amount', 'Amount')), 0);
      const male = state.filtered.filter(row => String(getValue(row, 'location', 'Location')).toLowerCase() === 'male').reduce((sum, row) => sum + cleanAmount(getValue(row, 'amount', 'Amount')), 0);
      const villimale = state.filtered.filter(row => String(getValue(row, 'location', 'Location')).toLowerCase() === 'villimale').reduce((sum, row) => sum + cleanAmount(getValue(row, 'amount', 'Amount')), 0);
      els.totalCount.textContent = state.filtered.length;
      els.totalAmount.textContent = formatMoney(total);
      els.maleAmount.textContent = formatMoney(male);
      els.villimaleAmount.textContent = formatMoney(villimale);
    }

    function render() {
      renderStats();
      els.rows.innerHTML = state.filtered.map(row => {
        const date = getValue(row, 'bill_date', 'Bill Date');
        const vendor = getValue(row, 'vendor', 'Vendor');
        const billNo = getValue(row, 'bill_no', 'Bill No');
        const location = getValue(row, 'location', 'Location');
        const tin = getValue(row, 'tin', 'TIN');
        const amount = getValue(row, 'amount', 'Amount');
        return `<tr>
          <td data-label="Date">${escapeHtml(date)}</td>
          <td data-label="Vendor"><strong>${escapeHtml(vendor)}</strong></td>
          <td data-label="Bill No">${escapeHtml(billNo)}</td>
          <td data-label="Location">${escapeHtml(location)}</td>
          <td data-label="TIN" class="muted">${escapeHtml(tin)}</td>
          <td data-label="Amount" class="amount">${formatMoney(amount)} MVR</td>
        </tr>`;
      }).join('');
      els.empty.style.display = state.filtered.length ? 'none' : 'block';
      els.empty.textContent = state.rows.length ? 'No bills match this filter.' : 'No bills loaded yet.';
    }

    function escapeHtml(value) {
      return String(value ?? '').replace(/[&<>"]/g, char => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[char]));
    }

    async function loadBills() {
      showNotice('', '');
      els.empty.style.display = 'block';
      els.empty.textContent = 'Loading bills...';

      const { data, error } = await db.from(TABLE_NAME).select('*').order('id', { ascending: false }).limit(5000);
      if (error) {
        showNotice('error', `Supabase read failed: ${error.message}. Check RLS policies and make sure the bills table has the CSV columns.`);
        state.rows = [];
        state.filtered = [];
        render();
        return;
      }

      state.rows = data || [];
      renderLocations();
      applyFilters();
      showNotice('ok', `Loaded ${state.rows.length} bill record(s).`);
    }

    async function addBill(event) {
      event.preventDefault();
      const payload = normalizeForInsert(new FormData(els.form));
      const { error } = await db.from(TABLE_NAME).insert(payload);
      if (error) {
        showNotice('error', `Save failed: ${error.message}. If your table uses lowercase columns, rename them or add the original CSV header columns.`);
        return;
      }
      els.dialog.close();
      els.form.reset();
      await loadBills();
    }

    document.getElementById('refreshBtn').addEventListener('click', loadBills);
    document.getElementById('addBtn').addEventListener('click', () => els.dialog.showModal());
    document.getElementById('closeDialog').addEventListener('click', () => els.dialog.close());
    document.getElementById('cancelBtn').addEventListener('click', () => els.dialog.close());
    els.form.addEventListener('submit', addBill);
    els.search.addEventListener('input', applyFilters);
    els.location.addEventListener('change', applyFilters);
    els.date.addEventListener('change', applyFilters);

    loadBills();
  </script>
</body>
</html>
