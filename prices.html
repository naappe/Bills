<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>White Saffron Prices</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f7f6f2;--card:#fff;--ink:#17211c;--muted:#6b746e;--line:#e4e2da;--navy:#0f172a;--teal:#0f766e;--cyan:#0891b2;--saffron:#d4a72c;--green:#15803d;--red:#c2410c;--shadow:0 12px 34px rgba(23,33,28,.07);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink)}button,input,select{font:inherit}.hidden{display:none!important}
.login{min-height:100vh;display:grid;place-items:center;padding:24px}.login-card{width:min(420px,100%);padding:30px;border:1px solid var(--line);border-radius:22px;background:#fff;box-shadow:var(--shadow)}.mark{width:50px;height:50px;border-radius:15px;background:linear-gradient(135deg,var(--teal),var(--cyan));display:grid;place-items:center;color:#fff;font-weight:900}.login h1{font-family:Georgia,serif;font-size:34px;margin:18px 0 6px}.login p{color:var(--muted)}.login form{display:grid;gap:12px;margin-top:22px}.notice{min-height:22px;color:#b91c1c;font-size:13px}
.field{width:100%;min-height:48px;border:1px solid var(--line);border-radius:13px;background:#fff;padding:0 15px;outline:0}.field:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(15,118,110,.12)}
.btn{min-height:46px;border:0;border-radius:13px;padding:0 18px;background:var(--teal);color:#fff;font-weight:800;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;justify-content:center}.btn.secondary{background:#fff;color:var(--ink);border:1px solid var(--line)}
.topnav{position:sticky;top:0;z-index:20;background:rgba(247,246,242,.94);backdrop-filter:blur(14px);border-bottom:1px solid var(--line)}.nav-inner{max-width:1180px;margin:auto;padding:14px 22px;display:flex;align-items:center;justify-content:space-between;gap:18px}.brand{display:flex;align-items:center;gap:10px;font-weight:900}.brand-icon{width:34px;height:34px;border-radius:10px;background:linear-gradient(135deg,var(--teal),#22c55e);display:grid;place-items:center;color:#fff;font-size:12px}.links{display:flex;align-items:center;gap:5px}.links a,.links button{border:0;background:transparent;color:#5f6963;text-decoration:none;padding:10px 12px;border-radius:10px;font-weight:700;cursor:pointer}.links a:hover,.links a.active{background:#fff;color:var(--teal);box-shadow:0 2px 10px rgba(0,0,0,.05)}
main{max-width:1180px;margin:auto;padding:62px 22px 80px}.hero{text-align:center;max-width:780px;margin:auto}.eyebrow{color:var(--teal);font-size:11px;font-weight:900;letter-spacing:.18em}.hero h1{font-family:Georgia,"Times New Roman",serif;font-weight:400;font-size:clamp(46px,7vw,82px);line-height:.98;margin:15px 0 22px}.hero h1 em{display:block;color:#74746d;font-weight:400}.hero p{max-width:620px;margin:auto;color:var(--muted);line-height:1.7}.stats{display:flex;justify-content:center;margin:34px 0 42px}.stat{min-width:130px;padding:0 28px;border-right:1px solid var(--line)}.stat:last-child{border:0}.stat strong{display:block;font-family:Georgia,serif;font-size:29px;font-weight:400}.stat span{font-size:10px;color:#8c918d;font-weight:850;letter-spacing:.12em;text-transform:uppercase}
.filters{max-width:850px;margin:auto;display:grid;grid-template-columns:minmax(260px,1fr) 220px 190px;gap:10px}.chips{display:flex;justify-content:center;gap:8px;flex-wrap:wrap;margin:18px 0 58px}.chip{border:1px solid transparent;border-radius:999px;padding:9px 14px;background:#eeece6;color:#565d58;font-size:12px;font-weight:750;cursor:pointer}.chip.active{background:var(--teal);color:#fff}
.results-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}.results-head p{color:var(--muted)}.results-head strong{color:var(--ink)}.cards{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:16px}.price-card{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:20px;box-shadow:0 2px 10px rgba(23,33,28,.025);transition:.18s}.price-card:hover{transform:translateY(-3px);box-shadow:var(--shadow)}.card-top{display:flex;justify-content:space-between;gap:12px;color:#8a908b;font-size:10px;font-weight:850;letter-spacing:.1em;text-transform:uppercase}.stock{color:var(--green)}.price-card h2{font-family:Georgia,serif;font-size:25px;font-weight:500;margin:18px 0 5px}.vendor{color:var(--muted);font-size:12px;min-height:34px}.price-row{display:flex;align-items:flex-end;justify-content:space-between;gap:14px;margin:23px 0 18px}.price{font-family:Georgia,serif;font-size:34px;line-height:1}.price small{font-family:Inter,sans-serif;font-size:11px;color:var(--muted)}.change{padding:6px 9px;border-radius:999px;background:#ecfdf5;color:var(--green);font-size:11px;font-weight:850}.change.up{background:#fff7ed;color:var(--red)}.change.flat{background:#f1f5f9;color:#64748b}.card-foot{border-top:1px solid var(--line);padding-top:14px;display:flex;justify-content:space-between;gap:12px;color:#8a908b;font-size:11px}.empty{grid-column:1/-1;padding:60px;text-align:center;color:var(--muted);background:#fff;border:1px solid var(--line);border-radius:18px}
@media(max-width:850px){.links{overflow:auto}.links a,.links button{white-space:nowrap}.nav-inner{align-items:flex-start;flex-direction:column}.links{width:100%}.filters{grid-template-columns:1fr}.cards{grid-template-columns:repeat(2,1fr)}main{padding-top:42px}}
@media(max-width:560px){.nav-inner{padding:10px 14px}.brand{display:none}main{padding:34px 14px 60px}.hero h1{font-size:44px}.stats{margin:28px 0}.stat{min-width:0;flex:1;padding:0 10px}.stat strong{font-size:23px}.cards{grid-template-columns:1fr}.chips{justify-content:flex-start;margin-bottom:36px}.results-head{align-items:flex-start}.price-card{padding:18px}}
</style>
</head>
<body>
<section id="app">
<header class="topnav"><div class="nav-inner"><div class="brand"><span class="brand-icon">WS</span>White Saffron</div><nav class="links"><a href="index.html#dashboard">Dashboard</a><a href="index.html#bills">Bills</a><a href="supply-rates.html">Supply Rates</a><a class="active" href="prices.html">Prices</a></nav></div></header>
<main>
<section class="hero"><div class="eyebrow">WHITE SAFFRON SUPPLY</div><h1>Current prices,<em>across our vendors.</em></h1><p>Latest recorded supply prices with vendor-specific history. Every amount is displayed exactly to two decimal places.</p></section>
<section class="stats"><div class="stat"><strong id="itemCount">0</strong><span>Items</span></div><div class="stat"><strong id="vendorCount">0</strong><span>Vendors</span></div><div class="stat"><strong id="recordCount">0</strong><span>Records</span></div></section>
<section class="filters"><input class="field" id="search" placeholder="Search item, vendor or item code"><select class="field" id="vendorFilter"><option value="">All vendors</option></select><select class="field" id="sort"><option value="alphabetical">Sort: Alphabetical</option><option value="newest">Sort: Newest</option><option value="high">Sort: Highest price</option><option value="low">Sort: Lowest price</option><option value="change">Sort: Biggest change</option></select></section>
<div class="chips"><button class="chip active" data-mode="all">All</button><button class="chip" data-mode="gst">Add GST +8%</button><button class="chip" data-mode="none">No GST</button><button class="chip" data-mode="changed">Price changed</button></div>
<section><div class="results-head"><p><strong id="showing">0</strong> latest prices</p><button class="btn secondary" id="clear">Clear filters</button></div><div class="cards" id="cards"></div></section>
</main></section>
<script>
const SUPABASE_URL='https://tmupbruwmwlrmewhoodn.supabase.co',KEY='sb_publishable_LAn1liS2zqMqlB33IQJxIw_NbgWKix1',db=window.supabase.createClient(SUPABASE_URL,KEY),$=id=>document.getElementById(id);let records=[],latest=[],mode='all';
const esc=v=>String(v??'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])),money=v=>Number(v||0).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2}),key=r=>(String(r.vendor||'').trim()+'|'+String(r.item_name||'').trim()).toLowerCase(),date=r=>new Date(r.invoice_date||r.created_at||0);
function buildLatest(){const groups=new Map();records.forEach(r=>{const k=key(r);if(!groups.has(k))groups.set(k,[]);groups.get(k).push(r)});latest=[...groups.values()].map(rows=>{rows.sort((a,b)=>date(b)-date(a));const current=rows[0],previous=rows[1],difference=previous?(+current.unit_rate||0)-(+previous.unit_rate||0):0,pct=previous&&+previous.unit_rate?difference/(+previous.unit_rate)*100:0;return{...current,previous,difference,pct}})}
function render(){const q=$('search').value.trim().toLowerCase(),vendor=$('vendorFilter').value,sort=$('sort').value;let rows=latest.filter(r=>(!q||[r.item_name,r.vendor,r.item_code].join(' ').toLowerCase().includes(q))&&(!vendor||r.vendor===vendor)&&(mode==='all'||mode==='gst'&&r.gst_mode==='exclusive'||mode==='none'&&r.gst_mode!=='exclusive'||mode==='changed'&&r.previous&&Math.abs(r.difference)>.0001));rows.sort((a,b)=>sort==='newest'?date(b)-date(a):sort==='high'?(+b.final_amount||0)-(+a.final_amount||0):sort==='low'?(+a.final_amount||0)-(+b.final_amount||0):sort==='change'?Math.abs(b.pct)-Math.abs(a.pct):String(a.item_name).localeCompare(String(b.item_name)));$('showing').textContent=rows.length.toLocaleString();$('cards').innerHTML=rows.map(r=>{const changed=r.previous&&Math.abs(r.difference)>.0001,cls=!changed?'flat':r.difference>0?'up':'',label=!changed?'No previous change':(r.difference>0?'▲ +':'▼ ')+money(Math.abs(r.difference))+' MVR',unitFinal=+r.final_amount/(+r.quantity||1);return '<article class="price-card"><div class="card-top"><span>'+esc(r.uom||'UNIT')+'</span><span class="stock">● Recorded</span></div><h2>'+esc(r.item_name||'Unnamed item')+'</h2><div class="vendor">'+esc(r.vendor||'No vendor')+(r.item_code?'<br>'+esc(r.item_code):'')+'</div><div class="price-row"><div class="price">'+money(unitFinal)+' <small>MVR / '+esc(r.uom||'unit')+'</small></div><span class="change '+cls+'">'+label+'</span></div><div class="card-foot"><span>'+(r.gst_mode==='exclusive'?'Add GST +8%':'No GST')+'</span><span>'+date(r).toLocaleDateString('en-GB',{timeZone:'Indian/Maldives'})+'</span></div></article>'}).join('')||'<div class="empty">No prices match these filters.</div>'}
async function load(){const{data,error}=await db.from('supply_rates').select('vendor,item_code,item_name,uom,quantity,unit_rate,gst_rate,gst_mode,final_amount,invoice_date,created_at').order('created_at',{ascending:false}).limit(5000);if(error){$('cards').innerHTML='<div class="empty">Unable to load prices: '+esc(error.message)+'</div>';return}records=data||[];buildLatest();const vendors=[...new Set(latest.map(r=>r.vendor).filter(Boolean))].sort((a,b)=>a.localeCompare(b));$('vendorFilter').innerHTML='<option value="">All vendors</option>'+vendors.map(v=>'<option>'+esc(v)+'</option>').join('');$('itemCount').textContent=latest.length.toLocaleString();$('vendorCount').textContent=vendors.length.toLocaleString();$('recordCount').textContent=records.length.toLocaleString();render()}
$('search').oninput=render;$('vendorFilter').onchange=render;$('sort').onchange=render;document.querySelectorAll('.chip').forEach(btn=>btn.onclick=()=>{mode=btn.dataset.mode;document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x===btn));render()});$('clear').onclick=()=>{$('search').value='';$('vendorFilter').value='';$('sort').value='alphabetical';mode='all';document.querySelectorAll('.chip').forEach(x=>x.classList.toggle('active',x.dataset.mode==='all'));render()};load();
</script>
</body></html>
