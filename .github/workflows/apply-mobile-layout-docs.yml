name: Apply mobile layout and docs

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/apply-mobile-layout-docs.yml'

permissions:
  contents: write

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update layout and docs
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          from datetime import date

          index = Path('index.html')
          s = index.read_text(encoding='utf-8')

          filter_match = re.search(r'\n\s*<section class="filter-card">.*?</section>\n', s, flags=re.S)
          if not filter_match:
              raise SystemExit('filter-card section not found')
          filter_block = filter_match.group(0)
          s = s[:filter_match.start()] + '\n' + s[filter_match.end():]

          stats_match = re.search(r'(<section class="stats" id="billsKpiSummaryCards".*?</section>)', s, flags=re.S)
          if not stats_match:
              raise SystemExit('KPI section not found')
          insert_at = stats_match.end()
          s = s[:insert_at] + '\n' + filter_block.strip('\n') + '\n' + s[insert_at:]

          s, hero_count = re.subn(
              r'<div class="panel pad dashboard-hero">.*?</div>',
              '',
              s,
              count=1,
              flags=re.S,
          )

          s = re.sub(
              r"if\(isAdmin\(\)\)notice\('ok',`Loaded \$\{state\.rows\.length\.toLocaleString\(\)\} total bill record\(s\)\. Viewing \$\{activeScope\(\)\}: \$\{activeRows\(\)\.length\.toLocaleString\(\)\} bills\.`\)",
              "notice('','')",
              s,
              count=1,
          )

          if s.count('id="searchInput"') != 1:
              raise SystemExit('searchInput duplicated or missing after move')
          if s.find('id="searchInput"') < s.find('id="billsKpiSummaryCards"'):
              raise SystemExit('search section is still above KPI cards')

          index.write_text(s, encoding='utf-8')

          stamp = date.today().isoformat()
          readme = Path('README.md')
          r = readme.read_text(encoding='utf-8') if readme.exists() else '# White Saffron Bills\n'
          note = f'''\n## Latest UI Update — {stamp}\n\n- KPI summary cards now appear before search and filters on mobile, tablet, and desktop.\n- Removed the large Executive Overview / Spending at a glance dashboard block.\n- Removed the successful-load banner from normal page display; error notices remain active.\n- No Supabase bill records or stock records were modified by this interface update.\n'''
          if '## Latest UI Update — ' in r:
              r = re.sub(r'\n## Latest UI Update — .*?(?=\n## |\Z)', note.rstrip() + '\n', r, count=1, flags=re.S)
          else:
              r = r.rstrip() + '\n' + note
          readme.write_text(r, encoding='utf-8')

          changelog = Path('CHANGELOG.md')
          c = changelog.read_text(encoding='utf-8') if changelog.exists() else '# Changelog\n'
          entry = f'''\n## {stamp}\n\n### Changed\n- Moved the search, status, and date controls below the KPI summary cards.\n- Removed the Executive Overview dashboard hero section.\n- Hid routine successful-load notices while preserving error reporting.\n\n### Data safety\n- No database schema or bill data changes.\n'''
          if f'## {stamp}' not in c:
              c = c.rstrip() + '\n' + entry
          changelog.write_text(c, encoding='utf-8')
          PY

      - name: Verify source
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          s=Path('index.html').read_text(encoding='utf-8')
          assert s.count('id="searchInput"') == 1
          assert s.find('id="searchInput"') > s.find('id="billsKpiSummaryCards"')
          assert 'EXECUTIVE OVERVIEW' not in s
          assert 'Spending at a glance' not in s
          assert s.count('<dialog') == s.count('</dialog>')
          assert s.count('<script') == s.count('</script>')
          print('Layout and static checks passed')
          PY

      - name: Commit source and documentation
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md CHANGELOG.md
          git diff --cached --quiet && exit 0
          git commit -m "Move filters below KPI cards and update docs"
          git push
