name: Pin Supabase dependency

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/pin-supabase.yml'

permissions:
  contents: write

jobs:
  pin-dependency:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Pin Supabase JavaScript dependency
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path("index.html")
          html = path.read_text(encoding="utf-8")
          old = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"
          new = "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.8"

          if old not in html:
              raise SystemExit("Unpinned Supabase dependency was not found")

          path.write_text(html.replace(old, new, 1), encoding="utf-8")
          PY
      - name: Commit dependency pin
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Pin Supabase JavaScript dependency"
          git push
