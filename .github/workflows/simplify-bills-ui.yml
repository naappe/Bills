name: Simplify Bills UI
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: write
jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply professional user-friendly layout
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          marker='/* SIMPLE PROFESSIONAL UI 2026 */'
          if marker in s:
              raise SystemExit(0)
          css=r'''

    /* SIMPLE PROFESSIONAL UI 2026 */
    :root{
      --bg:#f5f7fa;--panel:#ffffff;--soft:#f2f5f8;--ink:#172033;--muted:#637083;--line:#dde3ea;
      --primary:#2563eb;--primary-hover:#1d4ed8;--accent:#16865c;
      --paid:#16865c;--paid-soft:#eaf7f1;--pending:#b76b00;--pending-soft:#fff7e6;
      --danger:#c73737;--danger-soft:#fff0f0;--shadow:0 1px 2px rgba(15,23,42,.04);--shadow-hover:0 8px 24px rgba(15,23,42,.08)
    }
    body{background:var(--bg);font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;font-size:14px;line-height:1.5}
    h1{font-size:24px;font-weight:760;letter-spacing:-.02em}h2{font-size:17px}.muted{font-size:12px}
    .shell{grid-template-columns:220px minmax(0,1fr)}
    .sidebar{background:#fff;color:var(--ink);border-right:1px solid var(--line);box-shadow:none;padding:18px 12px;gap:16px}
    .side-logo,.brand-mark{background:#17324d!important;color:#fff!important;box-shadow:none!important}
    .side-title strong{color:var(--ink)}.side-title span{color:#7c8797}
    .nav{gap:4px}.nav button{min-height:44px;border-radius:9px;color:#5d6979;font-size:13px;font-weight:700;padding:0 12px}
    .nav button:hover{background:#f2f6fb;color:#17324d;transform:none}.nav button.active{background:#eaf1ff;color:#1d4ed8;box-shadow:inset 3px 0 #2563eb}
    .sidebar-summary{display:none!important}.user-chip{background:#f7f9fb;border-color:var(--line);padding:10px}
    .main{padding:24px;max-width:1600px;width:100%;margin:0 auto}.topbar{margin-bottom:18px;align-items:center}.title-block p{margin-top:5px}
    .btn{min-height:44px;border-radius:9px;padding:0 15px;font-size:13px;font-weight:750;box-shadow:none}.btn:hover{transform:none;box-shadow:none}.btn.secondary{background:#fff}.btn.ghost{background:#fff;border-color:var(--line)}
    .stats{gap:12px;margin-bottom:18px}.stat{border-radius:11px;padding:17px 18px;box-shadow:none}.stat-primary{background:#fff;border-color:var(--line)}
    .value,.stat-primary .value{font-size:24px;color:var(--ink)}.stat-head{font-size:11px}.stat-icon{background:#eef3f8}
    #dashboardView{display:block!important;background:transparent!important;border:0!important;padding:0!important}
    #dashboardView .dashboard-overview{display:grid!important;grid-template-columns:minmax(0,1fr) minmax(320px,.7fr);background:#fff!important;color:var(--ink)!important;border:1px solid var(--line)!important;border-radius:12px!important;padding:22px!important;box-shadow:none!important;margin-bottom:14px}
    #dashboardView .dashboard-overview:after{display:none}.dashboard-kicker{color:#2563eb!important}.dashboard-overview p{color:var(--muted)!important}.dashboard-overview h2{font-size:22px!important}
    #dashboardView .dashboard-mini-grid>div{background:#f7f9fb!important;border:1px solid var(--line)!important;border-top:0!important;border-radius:10px!important;box-shadow:none!important;padding:12px!important}
    #dashboardView .dashboard-mini-grid span{color:var(--muted)!important}.dashboard-mini-grid strong{font-size:15px!important;color:var(--ink)!important}
    #dashboardView>.dashboard-panel,#dashboardView>.dashboard-trend-panel,#dashboardView>.supply-chart-grid{display:none!important}
    .filter-card,.panel{border-radius:11px;box-shadow:none}.filter-card{padding:14px;margin-bottom:16px}.toolbar{grid-template-columns:minmax(220px,1fr) repeat(4,minmax(125px,160px));gap:10px}
    .field{min-height:44px;border-radius:9px;padding:0 12px}.field:focus{box-shadow:0 0 0 3px rgba(37,99,235,.12)}
    .panel-head{padding:15px 17px}.list-wrap{padding:10px}.bill-list{gap:9px}
    .bill-card{grid-template-columns:minmax(190px,1fr) minmax(260px,1.1fr) 135px 160px;border-radius:10px;padding:14px 15px;box-shadow:none;gap:14px}.bill-card:hover{transform:none;box-shadow:0 5px 16px rgba(15,23,42,.06);border-color:#cbd5e1}
    .vendor{font-size:14px}.amount{font-size:18px}.description-line{background:#f7f9fb;border-radius:8px}.status-pill,.tag{min-height:26px;font-size:11px}
    dialog{border-radius:12px}.modal-head,.modal-foot{padding:15px 18px}.modal-body{padding:18px;gap:12px}.modal-body label{font-size:12px}
    .login-page{background:#f5f7fa}.login-card{border-radius:14px;box-shadow:0 14px 40px rgba(15,23,42,.09)}
    @media(max-width:1000px){.toolbar{grid-template-columns:1fr 1fr}.bill-card{grid-template-columns:1fr 1fr}}
    @media(max-width:860px){.main{padding:14px}.sidebar{padding:10px;border-bottom:1px solid var(--line)}.nav button.active{box-shadow:inset 0 -3px #2563eb}.topbar{align-items:stretch}.actions{margin-top:12px}.dashboard-overview{grid-template-columns:1fr!important}.dashboard-mini-grid{grid-template-columns:1fr 1fr!important}}
    @media(max-width:560px){body{font-size:13px}.main{padding:10px}.title-block h1{font-size:21px}.actions{grid-template-columns:1fr}.toolbar{grid-template-columns:1fr}.stats{grid-template-columns:1fr 1fr}.stat{padding:14px}.value,.stat-primary .value{font-size:21px}.bill-card{grid-template-columns:1fr auto;padding:12px}.vendor{font-size:17px}.dashboard-mini-grid{grid-template-columns:1fr 1fr!important}}
'''
          s=s.replace('</style>',css+'\n  </style>',1)
          replacements={'Executive Dashboard':'Home','Dashboard':'Home','New Bill':'Add Bill','Vendor':'Supplier','Vendors':'Suppliers','Payment Status':'Paid / Not Paid','Gross Amount':'Bill Total','Analytics':'Reports'}
          for a,b in replacements.items(): s=s.replace(a,b)
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Simplify Bills layout for fast staff entry"
          git push
# trigger
