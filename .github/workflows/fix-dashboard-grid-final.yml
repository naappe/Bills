name: Fix dashboard grid final

on:
  push:
    paths:
      - '.github/workflows/fix-dashboard-grid-final.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix malformed dashboard layout
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          p = Path('index.html')
          s = p.read_text(encoding='utf-8')

          replacement = '''<section class="executive-dashboard hidden" id="dashboardView" aria-label="Executive Bills Dashboard">
        <div class="panel pad"><h2>Top Vendors</h2><p class="muted">Highest vendor totals under the active filter</p><div id="topVendors"></div></div>
        <div class="panel pad"><h2>Category Breakdown</h2><p class="muted">Spending grouped by bill category</p><div id="categoryDashboard"></div></div>
        <div class="panel pad"><h2>Payment Methods</h2><p class="muted">Cash, transfer, card and other methods</p><div id="paymentDashboard"></div></div>
        <div class="panel pad"><h2>Status Summary</h2><p class="muted">Paid, pending and cancelled totals</p><div id="statusSummary"></div></div>
      </section>'''

          pattern = r'<section class="executive-dashboard hidden" id="dashboardView".*?</section>'
          s, n = re.subn(pattern, replacement, s, count=1, flags=re.S)
          if n != 1:
              raise SystemExit('dashboard section not found')

          css = '''
    /* Final dashboard layout fix */
    .executive-dashboard{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;align-items:start;margin:0}
    .executive-dashboard.hidden{display:none!important}
    .executive-dashboard>.panel{min-width:0;height:auto}
    .executive-dashboard .bar-row{margin:10px 0}
    @media(max-width:900px){.executive-dashboard{grid-template-columns:1fr}}
'''
          if '/* Final dashboard layout fix */' not in s:
              s = s.replace('</style>', css + '  </style>', 1)

          p.write_text(s, encoding='utf-8')
          PY

      - name: Verify JavaScript syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          s=Path('index.html').read_text(encoding='utf-8')
          blocks=re.findall(r'<script(?![^>]*src=)[^>]*>(.*?)</script>',s,re.S)
          Path('/tmp/app.js').write_text('\n'.join(blocks),encoding='utf-8')
          assert s.count('id="dashboardView"') == 1
          assert '<div class="dashboard-primary"></div>' not in s
          PY
          node --check /tmp/app.js

      - name: Update docs
        shell: bash
        run: |
          cat >> CHANGELOG.md <<'EOF'

## 2026-07-12 — Final dashboard grid correction

- Replaced the malformed dashboard HTML structure.
- Removed the empty dashboard column that created the large white gap.
- Dashboard panels now use a balanced two-column desktop grid and one-column mobile layout.
- No Supabase data was changed.
EOF
          cat >> README.md <<'EOF'

## Final dashboard grid correction

The dashboard now uses a clean responsive grid without the previous empty white area. This was a frontend-only correction and did not modify bill data.
EOF

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md CHANGELOG.md
          git commit -m "Fix malformed dashboard grid and remove empty space"
          git push
