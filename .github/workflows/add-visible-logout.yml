name: Add visible logout button

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch Bills header logout
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old_header = '<div class="ocean-user-actions"><button class="ocean-bell" type="button" aria-label="Notifications">'
          new_header = '<div class="ocean-user-actions"><button class="ocean-header-logout" id="oceanLogoutBtn" type="button" aria-label="Sign out"><i class="fa-solid fa-right-from-bracket" aria-hidden="true"></i><span>Logout</span></button><button class="ocean-bell" type="button" aria-label="Notifications">'
          if 'id="oceanLogoutBtn"' not in text:
              if old_header not in text:
                  raise SystemExit('Ocean user actions marker not found')
              text = text.replace(old_header, new_header, 1)

          style = '''
          <style id="visible-logout-style">
          .ocean-header-logout{min-height:38px;padding:0 13px;border:1px solid rgba(255,255,255,.28);border-radius:999px;background:rgba(255,255,255,.14);color:#fff;font:700 12px "General Sans",Inter,sans-serif;display:inline-flex;align-items:center;gap:7px;cursor:pointer;transition:background .18s ease,transform .18s ease}.ocean-header-logout:hover{background:rgba(255,255,255,.24);transform:translateY(-1px)}.ocean-header-logout:focus-visible{outline:3px solid rgba(255,255,255,.45);outline-offset:2px}@media(max-width:520px){.ocean-header-logout{width:38px;padding:0;justify-content:center}.ocean-header-logout span{display:none}}
          </style>
          '''
          if 'id="visible-logout-style"' not in text:
              text = text.replace('</head>', style + '\n</head>', 1)

          listener = "$('oceanLogoutBtn')?.addEventListener('click',logout);"
          marker = "$('logoutBtn').addEventListener('click',logout);"
          if listener not in text:
              if marker not in text:
                  raise SystemExit('Logout listener marker not found')
              text = text.replace(marker, marker + '\n    ' + listener, 1)

          path.write_text(text, encoding='utf-8')
          PY
      - name: Commit update
        run: |
          if git diff --quiet; then
            echo "No changes needed"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Show logout button in Bills header"
          git push
