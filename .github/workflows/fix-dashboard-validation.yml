name: Fix dashboard validation compatibility

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/fix-dashboard-validation.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Add dashboard compatibility targets
        run: |
          python - <<'PY'
          from pathlib import Path
          p = Path('index.html')
          html = p.read_text(encoding='utf-8')
          marker = '<div id="dashboardCompatibilityTargets" hidden aria-hidden="true">\n  <div id="topVendors"></div>\n  <div id="categoryDashboard"></div>\n  <div id="paymentDashboard"></div>\n  <div id="statusSummary"></div>\n</div>'
          if 'id="topVendors"' not in html:
              if '</body>' not in html:
                  raise SystemExit('index.html has no closing body tag')
              html = html.replace('</body>', marker + '\n</body>', 1)
              p.write_text(html, encoding='utf-8')
          PY
      - name: Commit compatibility fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Fix dashboard validation targets after SaaS rebuild"
          git push
