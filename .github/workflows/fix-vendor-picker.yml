name: Fix vendor picker

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-vendor-picker.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update vendor picker logic
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old = """    function cleanVendorName(value){return String(value||'').trim().replace(/\\s+/g,' ')}
    function hasLegalSuffix(value){return /(?:\\bprivate|\\bpvt)[\\s.,]*(?:ltd|limited)[.]?$/i.test(cleanVendorName(value))}
    function vendorKey(value){return cleanVendorName(value).toLowerCase().replace(/[.,]/g,' ').replace(/\\s+/g,' ').trim().replace(/(?:\\bprivate|\\bpvt)\\s*(?:ltd|limited)$/,'').trim()}
    function rebuildVendorCanonicals(){const groups=new Map();state.rows.forEach(r=>{const name=cleanVendorName(get(r,'vendor')),key=vendorKey(name);if(!key)return;if(!groups.has(key))groups.set(key,new Map());const counts=groups.get(key);counts.set(name,(counts.get(name)||0)+1)});state.vendorCanonicals=new Map([...groups.entries()].map(([key,counts])=>[key,[...counts.entries()].sort((a,b)=>Number(hasLegalSuffix(a[0]))-Number(hasLegalSuffix(b[0]))||a[0].length-b[0].length||b[1]-a[1]||a[0].localeCompare(b[0]))[0][0]]))}
    function canonicalVendor(value){const clean=cleanVendorName(value),key=vendorKey(clean);return key?(state.vendorCanonicals.get(key)||clean):''}
"""

          new = """    function cleanVendorName(value){return String(value||'').trim().replace(/\\s+/g,' ')}
    function hasLegalSuffix(value){return /(?:\\bprivate|\\bpvt)[\\s.,]*(?:ltd|limited)[.]?$/i.test(cleanVendorName(value))}
    function vendorKey(value){return cleanVendorName(value).toLowerCase().replace(/&/g,' and ').replace(/[^a-z0-9]+/g,' ').replace(/\\b(?:private|pvt|limited|ltd)\\b/g,' ').replace(/\\s+/g,' ').trim()}
    const VENDOR_ALIASES={
      'adk general trading':'ADK General Trading',
      'adk gernal trading':'ADK General Trading',
      'adk grneral trading':'ADK General Trading',
      'al raas market':'Al Raas Mart',
      'al raas mart':'Al Raas Mart',
      'ai raas mart':'Al Raas Mart',
      'ali raas mart':'Al Raas Mart',
      'alcoyon bakery':'Alcyon Bakery',
      'alcyon bakery':'Alcyon Bakery',
      'aster':'Aster',
      'asters':'Aster',
      'asters super store':'Aster Super Store',
      'azlifa manzil roshi':'Azlifa Manzil Roshi'
    };
    function rebuildVendorCanonicals(){const groups=new Map();state.rows.forEach(r=>{const name=cleanVendorName(get(r,'vendor')),key=vendorKey(name);if(!key)return;if(!groups.has(key))groups.set(key,new Map());const counts=groups.get(key);counts.set(name,(counts.get(name)||0)+1)});state.vendorCanonicals=new Map([...groups.entries()].map(([key,counts])=>[key,VENDOR_ALIASES[key]||[...counts.entries()].sort((a,b)=>b[1]-a[1]||a[0].length-b[0].length||a[0].localeCompare(b[0]))[0][0]]))}
    function canonicalVendor(value){const clean=cleanVendorName(value),key=vendorKey(clean);return key?(VENDOR_ALIASES[key]||state.vendorCanonicals.get(key)||clean):''}
"""

          if old not in text:
              raise SystemExit('Vendor logic block not found; no file changed.')

          text = text.replace(old, new, 1)

          old_options = """    function renderVendorOptions(){const current=els.vendorSelect.value,names=[...new Set(state.rows.map(r=>canonicalVendor(get(r,'vendor'))).filter(Boolean))].sort((a,b)=>a.localeCompare(b));els.vendorSelect.innerHTML='<option value="">Select vendor...</option>'+names.map(name=>`<option value="${esc(name)}">${esc(name)}</option>`).join('')+'<option value="__new__">＋ Create new vendor</option>';if([...els.vendorSelect.options].some(o=>o.value===current))els.vendorSelect.value=current;renderVendorPickerList()}
"""
          new_options = """    function renderVendorOptions(){const current=canonicalVendor(els.vendorSelect.value),names=[...new Set(state.rows.map(r=>canonicalVendor(get(r,'vendor'))).filter(Boolean))].sort((a,b)=>a.localeCompare(b,undefined,{sensitivity:'base'}));els.vendorSelect.innerHTML='<option value="">Select vendor...</option>'+names.map(name=>`<option value="${esc(name)}">${esc(name)}</option>`).join('');if([...els.vendorSelect.options].some(o=>o.value===current))els.vendorSelect.value=current;renderVendorPickerList()}
"""

          if old_options not in text:
              raise SystemExit('Vendor options function not found; no file changed.')

          text = text.replace(old_options, new_options, 1)
          text = text.replace("<span>Choose an existing vendor or create a new one</span>", "<span>Choose an existing vendor</span>", 1)
          text = text.replace("<button class=\"btn vendor-create-button\" id=\"createVendorButton\" type=\"button\">＋ Create New Vendor</button>", "", 1)
          text = text.replace("    $('createVendorButton').addEventListener('click',()=>{els.vendorSelect.value='__new__';toggleNewVendorField();closeVendorPicker();setTimeout(()=>els.newVendorInput.focus(),0)});\n", "", 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix vendor selection for new bills"
          git push
