name: Improve new vendor checks

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/improve-new-vendor-check.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Patch vendor duplicate detection
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          marker = "    function canonicalVendor(value){const clean=cleanVendorName(value),key=vendorKey(clean);return key?(state.vendorCanonicals.get(key)||clean):''}\n"
          insert = marker + """    function levenshtein(a,b){a=vendorKey(a);b=vendorKey(b);if(a===b)return 0;if(!a.length)return b.length;if(!b.length)return a.length;const prev=Array.from({length:b.length+1},(_,i)=>i);for(let i=1;i<=a.length;i++){let left=i,diag=i-1;for(let j=1;j<=b.length;j++){const up=prev[j],cost=a[i-1]===b[j-1]?0:1,next=Math.min(up+1,left+1,diag+cost);diag=up;prev[j]=next;left=next}}return prev[b.length]}
    function vendorSimilarity(a,b){const ka=vendorKey(a),kb=vendorKey(b);if(!ka||!kb)return 0;if(ka===kb)return 1;const max=Math.max(ka.length,kb.length);return max?1-levenshtein(ka,kb)/max:0}
    function existingVendorNames(){return [...new Set(state.rows.map(r=>cleanVendorName(get(r,'vendor'))).filter(Boolean))]}
    function findExistingVendorMatch(value){const clean=cleanVendorName(value),key=vendorKey(clean);if(!key)return null;const exact=existingVendorNames().find(name=>vendorKey(name)===key);if(exact)return{name:canonicalVendor(exact),score:1,exact:true};let best=null;for(const name of existingVendorNames()){const score=vendorSimilarity(clean,name);if(!best||score>best.score)best={name:canonicalVendor(name),score,exact:false}}return best&&best.score>=0.72?best:null}
"""
          if marker not in text:
              raise SystemExit('canonical vendor marker not found')
          text = text.replace(marker, insert, 1)

          old = """    async function saveBill(e){e.preventDefault();if(!els.vendorSelect.value){openVendorPicker();return}const id=els.form.elements.id.value,r=id?state.rows.find(x=>String(x.id)===String(id)):null,creatingVendor=els.vendorSelect.value==='__new__',enteredVendor=creatingVendor?cleanVendorName(els.newVendorInput.value):canonicalVendor(els.vendorSelect.value),billNoField=els.form.elements.bill_no,duplicate=findDuplicateBillNo(billNoField.value,id);billNoField.setCustomValidity('');if(creatingVendor&&!enteredVendor){els.newVendorInput.reportValidity();return}if(creatingVendor&&!confirm(`"${enteredVendor}" is a new vendor. Create this vendor and save the bill?`)){els.newVendorInput.focus();return}if(duplicate){billNoField.setCustomValidity(`Bill No already exists in record #${duplicate.id}. Enter a unique Bill No.`);billNoField.reportValidity();return}if(r&&!canEdit(r)){notice('error','This entry is locked. Staff can edit/delete only within 24 hours.');return}const formData=new FormData(els.form),req=id?db.from(TABLE_NAME).update(buildPayload(formData)).eq('id',id).select('id'):db.from(TABLE_NAME).insert(buildPayload(formData)).select('id');const{data,error}=await req;if(error){notice('error',`Save failed: ${error.message}`);return}if(!data||data.length===0){notice('error','Update was blocked by database permissions. This admin account needs an UPDATE policy for existing bills.');return}els.dialog.close();await loadBills()}
"""
          new = """    async function saveBill(e){e.preventDefault();if(!els.vendorSelect.value){openVendorPicker();return}const id=els.form.elements.id.value,r=id?state.rows.find(x=>String(x.id)===String(id)):null,creatingVendor=els.vendorSelect.value==='__new__',enteredVendor=creatingVendor?cleanVendorName(els.newVendorInput.value):canonicalVendor(els.vendorSelect.value),billNoField=els.form.elements.bill_no,duplicate=findDuplicateBillNo(billNoField.value,id);billNoField.setCustomValidity('');if(creatingVendor&&!enteredVendor){els.newVendorInput.reportValidity();return}if(creatingVendor){const match=findExistingVendorMatch(enteredVendor);if(match&&match.exact){els.vendorSelect.value=match.name;toggleNewVendorField();notice('ok',`Vendor already exists. Selected "${match.name}" instead.`);return}if(match&&!match.exact){const useExisting=confirm(`A similar vendor already exists:\n\n${match.name}\n\nPress OK to use the existing vendor. Press Cancel only if "${enteredVendor}" is a genuinely different new shop.`);if(useExisting){els.vendorSelect.value=match.name;toggleNewVendorField();notice('ok',`Selected existing vendor "${match.name}". Press Save again to save the bill.`);return}}if(!confirm(`Create new vendor "${enteredVendor}" and save this bill?\n\nNo existing bills or vendor data will be deleted or changed.`)){els.newVendorInput.focus();return}}if(duplicate){billNoField.setCustomValidity(`Bill No already exists in record #${duplicate.id}. Enter a unique Bill No.`);billNoField.reportValidity();return}if(r&&!canEdit(r)){notice('error','This entry is locked. Staff can edit/delete only within 24 hours.');return}const formData=new FormData(els.form),req=id?db.from(TABLE_NAME).update(buildPayload(formData)).eq('id',id).select('id'):db.from(TABLE_NAME).insert(buildPayload(formData)).select('id');const{data,error}=await req;if(error){notice('error',`Save failed: ${error.message}`);return}if(!data||data.length===0){notice('error','Update was blocked by database permissions. This admin account needs an UPDATE policy for existing bills.');return}els.dialog.close();await loadBills()}
"""
          if old not in text:
              raise SystemExit('saveBill block not found')
          text = text.replace(old, new, 1)

          path.write_text(text, encoding='utf-8')
          PY

      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Add safe new vendor duplicate detection"
          git push
