name: Apply stable Bills app

on:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-v9.py'
      - 'assets/design-tokens.css'
      - 'assets/theme-settings.js'
      - 'assets/brand-v9.css'
      - 'assets/app-v13.js'
      - 'assets/layout-v14.js'
      - 'assets/dashboard-v15.js'
      - 'assets/dashboard-v15.css'
      - 'assets/bills-v16.js'
      - 'assets/bills-v16.css'
      - 'assets/crud-v17.js'
      - 'assets/crud-v17.css'
      - '.github/workflows/apply-v9.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-bills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Apply stable migration
        run: python scripts/apply-v9.py

      - name: Verify generated files
        run: |
          python - <<'PY'
          from pathlib import Path
          html = Path('index.html').read_text(encoding='utf-8')
          required_ids = ['dashboardView','topVendors','categoryDashboard','paymentDashboard','statusSummary','loginView','appView','sidebar','content']
          problems = []
          for element_id in required_ids:
              count = html.count(f'id="{element_id}"')
              if count != 1:
                  problems.append(f'{element_id}: expected 1, found {count}')
          required_assets = ['assets/design-tokens.css?v=1','assets/theme-settings.js?v=1','assets/brand-v9.css?v=13','assets/app-v13.js?v=13','assets/layout-v14.js?v=14','assets/dashboard-v15.js?v=15','assets/dashboard-v15.css?v=15','assets/bills-v16.js?v=16','assets/bills-v16.css?v=16','assets/crud-v17.js?v=17','assets/crud-v17.css?v=17']
          for asset in required_assets:
              count = html.count(asset)
              if count != 1:
                  problems.append(f'asset expected once: {asset}; found {count}')
          obsolete_assets = ['brand-v5.css?v=5','brand-v6.css?v=6','modern-v5.css?v=5','assets/brand-v6.css?v=6','assets/brand-v7.css?v=7','assets/input-fix-v6.js?v=6','assets/vendor-v9.js','assets/performance-v12.js']
          for asset in obsolete_assets:
              if asset in html:
                  problems.append(f'obsolete asset still referenced: {asset}')
          if problems:
              raise SystemExit('\n'.join(problems))
          print('Master design and CRUD audit passed.')
          PY

      - name: Commit generated index
        run: |
          if git diff --quiet -- index.html; then
            echo 'No index.html changes needed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Apply normalized vendor and product CRUD'
          git push
