name: Apply stable Bills app

on:
  push:
    branches: [main]
    paths:
      - 'scripts/apply-v9.py'
      - 'assets/**'
      - '.github/workflows/apply-v9.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-bills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Apply stable migration
        run: python scripts/apply-v9.py
      - name: Verify generated files
        run: |
          python - <<'PY'
          from pathlib import Path
          html=Path('index.html').read_text(encoding='utf-8')
          required_ids=['dashboardView','topVendors','categoryDashboard','paymentDashboard','statusSummary','loginView','appView','sidebar','content']
          required_assets=['assets/design-tokens.css?v=1','assets/theme-settings.js?v=1','assets/brand-v9.css?v=13','assets/app-v13.js?v=13','assets/layout-v14.js?v=14','assets/dashboard-v15.js?v=15','assets/dashboard-v15.css?v=15','assets/bills-v16.js?v=16','assets/bills-v16.css?v=16','assets/crud-v17.js?v=17','assets/crud-v17.css?v=17','assets/procurement-v18.js?v=18','assets/procurement-v18.css?v=18','assets/operations-v19.js?v=19','assets/operations-v19.css?v=19']
          problems=[]
          for element_id in required_ids:
              if html.count(f'id="{element_id}"')!=1: problems.append(f'{element_id} invalid')
          for asset in required_assets:
              if html.count(asset)!=1: problems.append(f'{asset} invalid')
          if problems: raise SystemExit('\n'.join(problems))
          print('Procurement phases 3-8 audit passed.')
          PY
      - name: Commit generated index
        run: |
          if git diff --quiet -- index.html; then
            echo 'No index.html changes needed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Apply phase 8 settings roles approvals and recovery'
          git push