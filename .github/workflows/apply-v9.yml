name: Apply stable Bills app

on:
  push:
    branches: [main]
    paths:
      - 'scripts/**'
      - 'assets/**'
      - 'README.md'
      - 'RELEASE-CHECKLIST.md'
      - '.github/workflows/apply-v9.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: apply-bills-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Generate stable application
        run: python scripts/apply-v9.py

      - name: Run final release audit
        run: python scripts/release-audit.py

      - name: Commit generated index
        run: |
          if git diff --quiet -- index.html; then
            echo 'No index.html changes needed.'
            exit 0
          fi
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add index.html
          git commit -m 'Apply Procurement ERP v1.0 release audit'
          git push
