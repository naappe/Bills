name: Validate Bills dashboard

on:
  workflow_dispatch:
  push:
    paths:
      - 'index.html'
      - '.github/workflows/build-standard-analytics-dashboard.yml'

permissions:
  contents: read

jobs:
  validate-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate dashboard markup
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          html = Path('index.html').read_text(encoding='utf-8')
          matches = re.findall(
              r'<section class="executive-dashboard[^"]*" id="dashboardView"[^>]*>(.*?)</section>',
              html,
              re.S,
          )
          if len(matches) != 1:
              raise SystemExit(f'Expected one dashboardView section; found {len(matches)}.')

          dashboard = matches[0]
          required_ids = [
              'topVendors',
              'categoryDashboard',
              'paymentDashboard',
              'statusSummary',
              'averageBill',
              'paidDashboardAmount',
              'paymentRate',
              'largestBill',
              'dashboardInsight',
          ]
          missing = [element_id for element_id in required_ids if html.count(f'id="{element_id}"') != 1]
          if missing:
              raise SystemExit(f'Dashboard IDs missing or duplicated: {", ".join(missing)}')

          if html.count('id="dashboardView"') != 1:
              raise SystemExit('dashboardView must occur exactly once.')

          print('Dashboard markup validation passed.')
          PY

      - name: Check JavaScript syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*src=)[^>]*>(.*?)</script>', html, re.S)
          scripts = [script.strip() for script in scripts if script.strip()]
          Path('/tmp/bills-app.js').write_text('\n'.join(scripts), encoding='utf-8')
          print(f'Found {len(scripts)} inline script(s).')
          PY
          if [ -s /tmp/bills-app.js ]; then
            node --check /tmp/bills-app.js
          else
            echo "No inline scripts found to check."
          fi
