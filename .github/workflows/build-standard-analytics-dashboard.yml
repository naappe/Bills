name: Fix existing dashboard layout

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/build-standard-analytics-dashboard.yml'

permissions:
  contents: write

jobs:
  fix-dashboard:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Fix existing dashboard markup and spacing
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          # Use regex to find the dashboard section regardless of formatting
          old_pattern = r'<section class="executive-dashboard[^"]*" id="dashboardView"[^>]*>.*?</section>'
          
          # The new dashboard HTML
          new = '''<section class="executive-dashboard hidden" id="dashboardView" aria-label="Executive Bills Dashboard">
        <div class="panel pad dashboard-panel"><h2>Top Vendors</h2><p class="muted">Highest vendor totals under the active filter</p><div id="topVendors"></div></div>
        <div class="panel pad dashboard-panel"><h2>Category Breakdown</h2><p class="muted">Spending grouped by bill category</p><div id="categoryDashboard"></div></div>
        <div class="panel pad dashboard-panel"><h2>Payment Methods</h2><p class="muted">Cash, transfer, card and other methods</p><div id="paymentDashboard"></div></div>
        <div class="panel pad dashboard-panel"><h2>Status Summary</h2><p class="muted">Paid, pending and cancelled totals</p><div id="statusSummary"></div></div>
      </section>'''

          # Find the dashboard section
          match = re.search(old_pattern, html, re.DOTALL)
          if not match:
              raise SystemExit('Existing dashboard block was not found. No source file was changed.')

          # Replace it
          html = html.replace(match.group(0), new, 1)

          # Add CSS
          css = '''
    /* Existing dashboard alignment repair */
    .executive-dashboard{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;align-items:start;width:100%;margin:0}
    .executive-dashboard.hidden{display:none!important}
    .dashboard-panel{min-width:0;margin:0;min-height:0}
    .dashboard-panel h2{margin:0 0 4px}
    .dashboard-panel>.muted{margin:0 0 14px}
    .dashboard-panel .bar-row{grid-template-columns:minmax(0,1fr) 120px;width:100%;margin:10px 0}
    @media(max-width:1050px){.executive-dashboard{grid-template-columns:1fr}}
    @media(max-width:700px){.executive-dashboard{gap:14px}.dashboard-panel{padding:16px}.dashboard-panel .bar-row{grid-template-columns:minmax(0,1fr) 92px}}
'''

          marker = '</style>'
          if '/* Existing dashboard alignment repair */' not in html:
              html = html.replace(marker, css + '  ' + marker, 1)

          # Verify the replacement worked
          assert html.count('id="dashboardView"') == 1, "dashboardView count is not 1"
          assert html.count('id="topVendors"') == 1, "topVendors count is not 1"
          assert html.count('id="categoryDashboard"') == 1, "categoryDashboard count is not 1"
          assert html.count('id="paymentDashboard"') == 1, "paymentDashboard count is not 1"
          assert html.count('id="statusSummary"') == 1, "statusSummary count is not 1"
          assert 'dashboard-primary' not in html, "dashboard-primary still exists"
          assert 'dashboard-secondary' not in html, "dashboard-secondary still exists"

          path.write_text(html, encoding='utf-8')
          print("✅ Dashboard successfully updated!")
PY

      - name: Check JavaScript syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          html = Path('index.html').read_text(encoding='utf-8')
          scripts = re.findall(r'<script(?![^>]*src=)[^>]*>(.*?)</script>', html, re.S)
          Path('/tmp/bills-app.js').write_text('\n'.join(scripts), encoding='utf-8')
PY
          node --check /tmp/bills-app.js

      - name: Commit dashboard fix
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Fix existing dashboard alignment"
          git push
