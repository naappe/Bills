name: Validate White Saffron application

on:
  workflow_dispatch:
  push:
    paths:
      - '**.html'
      - '**.css'
      - '**.js'
      - '**.sql'
      - '**.webmanifest'
      - '.github/workflows/build-standard-analytics-dashboard.yml'

permissions:
  contents: read

jobs:
  validate-site:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate files, links, manifest and application standards
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          from html.parser import HTMLParser
          import json, sys

          pages = sorted(Path('.').glob('*.html'))
          required = {'index.html', 'master.html'}
          missing = sorted(required - {p.name for p in pages})
          if missing:
              raise SystemExit('Missing application pages: ' + ', '.join(missing))

          failures = []
          class Scan(HTMLParser):
              def __init__(self):
                  super().__init__(); self.ids=[]; self.refs=[]
              def handle_starttag(self, tag, attrs):
                  a=dict(attrs)
                  if 'id' in a and '$'+'{' not in a['id'] and '{{' not in a['id']:
                      self.ids.append(a['id'])
                  for key in ('href','src'):
                      value=a.get(key,'')
                      if value and not value.startswith(('#','http:','https:','mailto:','tel:','data:','blob:')):
                          self.refs.append(value.split('#')[0].split('?')[0])

          for page in pages:
              text=page.read_text(encoding='utf-8')
              scan=Scan(); scan.feed(text)
              dup=sorted({x for x in scan.ids if scan.ids.count(x)>1})
              if dup: failures.append(f'{page}: duplicate IDs: {", ".join(dup)}')
              for ref in scan.refs:
                  if not (page.parent/ref).resolve().exists(): failures.append(f'{page}: missing local reference {ref}')
              if '@supabase/supabase-js@2"' in text: failures.append(f'{page}: Supabase dependency is not pinned')
              if 'whitesafrron2025@gmail.com' in text: failures.append(f'{page}: misspelled White user email')
                    if failures:
              print('\n'.join(failures), file=sys.stderr)
              raise SystemExit(1)
          print(f'Validated {len(pages)} application pages.')
          PY

      - name: Check every JavaScript source
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          for file in *.js; do node --check "$file"; done
          python - <<'PY'
          from pathlib import Path
          import re, subprocess, tempfile
          for page in sorted(Path('.').glob('*.html')):
              scripts=[s.strip() for s in re.findall(r'<script(?![^>]*\bsrc=)[^>]*>(.*?)</script>',page.read_text(encoding='utf-8'),re.S) if s.strip()]
              if not scripts: continue
              with tempfile.NamedTemporaryFile('w',suffix='.js',delete=False,encoding='utf-8') as f:
                  f.write('\n'.join(scripts)); name=f.name
              subprocess.run(['node','--check',name],check=True)
              print('JavaScript OK:',page)
          PY

      - name: Validate dashboard contract
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          html=Path('index.html').read_text(encoding='utf-8')
          required=['dashboardView','topVendors','categoryDashboard','paymentDashboard','statusSummary']
          bad=[x for x in required if html.count(f'id="{x}"') != 1]
          if bad: raise SystemExit('Missing or duplicated dashboard IDs: '+', '.join(bad))
          print('Dashboard contract passed.')
          PY
