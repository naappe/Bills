name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-main
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Verify current ERP build
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f assets/js/core/ui.js
          test -f assets/js/core/pages.js
          test -f assets/js/core/router.js
          test -f assets/js/core/admin.js
          test -f assets/js/core/controller.js
          node --check assets/js/core/ui.js
          node --check assets/js/core/pages.js
          node --check assets/js/core/router.js
          node --check assets/js/core/admin.js
          node --check assets/js/core/controller.js
          grep -q 'pages.js?v=19' index.html
          grep -q 'router.js?v=19' index.html
          ! grep -q 'page-polish.js' index.html
          ! grep -q 'insights.js' index.html
          ! grep -q 'page-sections.js' index.html
          ! grep -q 'rank-bars.js' index.html
          ! grep -q 'bills-page.js' index.html
          printf '{"build":"v19","commit":"%s","deployed_at":"%s"}\n' "$GITHUB_SHA" "$(date -u +%FT%TZ)" > build.json
          touch .nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload verified site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy verified site
        id: deployment
        uses: actions/deploy-pages@v4
