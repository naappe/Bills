name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-main
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout current main branch
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Verify current ERP build
        shell: bash
        run: |
          set -euo pipefail
          test -f index.html
          test -f assets/js/core/insights.js
          test -f assets/js/core/page-sections.js
          test -f assets/js/core/rank-bars.js
          test -f assets/js/core/admin.js
          grep -q 'page-sections.js?v=15' index.html
          grep -q 'rank-bars.js?v=15' index.html
          printf '{"build":"v15","commit":"%s","deployed_at":"%s"}\n' "$GITHUB_SHA" "$(date -u +%FT%TZ)" > build.json
          touch .nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload verified site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy verified site
        id: deployment
        uses: actions/deploy-pages@v4
