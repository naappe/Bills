name: Apply White Saffron brand v6
on:
  workflow_dispatch:
  push:
    paths:
      - 'brand-v6.css'
      - 'brand-v6.js'
      - '.github/workflows/apply-brand-v6.yml'
permissions:
  contents: write
jobs:
  apply:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Apply branded assets
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          css='<link rel="stylesheet" href="brand-v6.css?v=6">'
          lucide='<script src="https://cdn.jsdelivr.net/npm/lucide@0.468.0/dist/umd/lucide.min.js"></script>'
          js='<script src="brand-v6.js?v=6"></script>'
          if css not in s:
              s=s.replace('</head>',css+'\n'+lucide+'\n</head>')
          elif lucide not in s:
              s=s.replace('</head>',lucide+'\n</head>')
          if js not in s:
              s=s.replace('</body>',js+'\n</body>')
          p.write_text(s,encoding='utf-8')
          PY
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Apply White Saffron branded interface v6"
          git push
