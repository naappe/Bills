name: Direct login syntax hotfix

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/direct-login-hotfix.yml'

permissions:
  contents: write

jobs:
  hotfix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix broken renderStats syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          bad="els.filterSummary.textContent=`Showing ${state.filtered.length.toLocaleString()} of ${scopeRows.length.toLocaleString()} ${scope} records. This year: ${state.yearRows.length.toLocaleString()}. Total loaded from Supabase: ${state.rows.length.toLocaleString()}.`:''}"
          good="els.filterSummary.textContent=''}"
          if bad not in s:
              raise SystemExit('Expected broken renderStats text not found')
          s=s.replace(bad,good,1)
          p.write_text(s,encoding='utf-8')
          PY

      - name: Verify JavaScript syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          s=Path('index.html').read_text(encoding='utf-8')
          blocks=re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>',s,re.S)
          inline=[b for b in blocks if b.strip()]
          Path('/tmp/app.js').write_text('\n'.join(inline),encoding='utf-8')
          PY
          node --check /tmp/app.js

      - name: Commit hotfix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "Fix login JavaScript syntax error"
          git push
