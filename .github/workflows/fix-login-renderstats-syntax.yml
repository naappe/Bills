name: Fix login renderStats syntax

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-login-renderstats-syntax.yml'

permissions:
  contents: write

jobs:
  fix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fix JavaScript syntax
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('index.html')
          s=p.read_text(encoding='utf-8')
          bad="els.filterSummary.class.add('hidden');els.filterSummary.textContent=`Showing ${state.filtered.length.toLocaleString()} of ${scopeRows.length.toLocaleString()} ${scope} records. This year: ${state.yearRows.length.toLocaleString()}. Total loaded from Supabase: ${state.rows.length.toLocaleString()}.`:''}"
          good="els.filterSummary.classList.add('hidden');els.filterSummary.textContent='' }"
          if bad not in s:
              bad2="els.filterSummary.classList.add('hidden');els.filterSummary.textContent=`Showing ${state.filtered.length.toLocaleString()} of ${scopeRows.length.toLocaleString()} ${scope} records. This year: ${state.yearRows.length.toLocaleString()}. Total loaded from Supabase: ${state.rows.length.toLocaleString()}.`:''}"
              if bad2 not in s:
                  raise SystemExit('Broken renderStats pattern not found')
              s=s.replace(bad2,good,1)
          else:
              s=s.replace(bad,good,1)
          p.write_text(s,encoding='utf-8')
          PY

      - name: Verify inline JavaScript parses
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          s=Path('index.html').read_text(encoding='utf-8')
          scripts=re.findall(r'<script(?:\s[^>]*)?>(.*?)</script>',s,re.S)
          inline='\n'.join(x for x in scripts if x.strip())
          Path('/tmp/app.js').write_text(inline,encoding='utf-8')
          PY
          node --check /tmp/app.js

      - name: Update documentation
        shell: bash
        run: |
          cat >> CHANGELOG.md <<'EOF'

## 2026-07-12 — Login hotfix

### Fixed
- Corrected a JavaScript syntax error in `renderStats` that prevented the login form handler and application scripts from running.
- No Supabase data or database schema was changed.
EOF
          cat >> README.md <<'EOF'

## Login hotfix — 2026-07-12

A frontend JavaScript syntax error introduced during the header cleanup was corrected. Login and application startup now execute normally. No bill data was modified.
EOF

      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md CHANGELOG.md
          git commit -m "Fix login JavaScript syntax error"
          git push
