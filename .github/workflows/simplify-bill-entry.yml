name: Simplify Bill Entry

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/simplify-bill-entry.yml'

permissions:
  contents: write

jobs:
  simplify:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Simplify bill form
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('index.html')
          html = path.read_text(encoding='utf-8')

          new_dialog = '''<dialog id="billDialog"><form id="billForm"><div class="modal-head"><div><strong id="dialogTitle">Add a new bill</strong><div class="muted">Enter the essentials first. Extra information is optional.</div></div><button class="btn secondary" type="button" id="closeDialog">Close</button></div><div class="modal-body modern-bill-body"><input type="hidden" name="id"><section class="quick-fields"><label>Vendor<input class="field" name="vendor" required placeholder="Select or enter vendor"></label><label>Bill date<input class="field" name="bill_date" type="date" required></label><label>Status<select class="field" name="payment_status"><option>Pending</option><option>Paid</option><option>Cancelled</option></select></label></section><section class="items modern-items"><div class="items-head"><div><strong>Bill items</strong><span class="muted">Add what was purchased. Totals calculate automatically.</span></div><button class="btn secondary" type="button" id="addItemBtn">+ Add item</button></div><div class="table-wrap"><table><thead><tr><th>Description</th><th>Qty</th><th>Unit</th><th>Rate</th><th>GST</th><th>Amount</th><th></th></tr></thead><tbody id="itemRows"></tbody></table></div></section><aside class="bill-summary"><div class="summary-label">Bill summary</div><div class="total-row"><span>Subtotal</span><strong id="subTotal">MVR 0.00</strong></div><div class="total-row"><span>GST</span><strong id="gstTotal">MVR 0.00</strong></div><div class="total-row grand"><span>Total due</span><strong id="grandTotal">MVR 0.00</strong></div></aside><details class="advanced-fields"><summary><span><i class="fa-solid fa-sliders"></i> More details</span><small>Due date, bill number, payment method and notes</small></summary><div class="advanced-grid"><label>Due date<input class="field" name="due_date" type="date"></label><label>Bill number<input class="field" name="bill_no"></label><label>TIN<input class="field" name="tin"></label><label>Location<input class="field" name="location"></label><label>Payment method<select class="field" name="payment_method"><option value="">Not set</option><option>Cash</option><option>Bank Transfer</option><option>Card</option><option>Credit</option><option>Other</option></select></label><label>Category<select class="field" name="category"><option>Food & Grocery</option><option>Packaging</option><option>Utilities</option><option>Maintenance</option><option>Transport</option><option>Office</option><option>Other</option></select></label><label class="full">Notes<textarea class="field" name="notes" placeholder="Optional remarks or payment reference"></textarea></label></div></details></div><div class="modal-foot"><button class="btn secondary" type="button" id="cancelDialog">Cancel</button><button class="btn" type="submit"><i class="fa-solid fa-check"></i> Save bill</button></div></form></dialog>'''

          html, count = re.subn(r'<dialog id="billDialog">.*?</dialog>', new_dialog, html, count=1, flags=re.S)
          if count != 1:
              raise SystemExit('Bill dialog block not found')

          css = '''\n<style id="modern-bill-entry-style">\n#billDialog{width:min(1040px,calc(100% - 24px));}\n.modern-bill-body{display:grid!important;grid-template-columns:minmax(0,1fr) 280px!important;gap:16px!important;padding:18px!important;}\n.quick-fields{grid-column:1/-1;display:grid;grid-template-columns:1.5fr 1fr 1fr;gap:12px;padding:14px;border:1px solid #cfd5de;border-radius:14px;background:#e9edf2;}\n.quick-fields label,.advanced-grid label{display:grid;gap:6px;color:#515b69;font-size:10px;font-weight:750;}\n.modern-items{grid-column:1!important;align-self:start;background:#f8f9fb!important;}\n.modern-items .items-head>div{display:grid;gap:3px;}\n.bill-summary{grid-column:2;align-self:start;position:sticky;top:0;padding:18px;border:1px solid #cbd1da;border-radius:14px;background:#e3e7ed;display:grid;gap:12px;}\n.summary-label{font-size:11px;font-weight:850;text-transform:uppercase;letter-spacing:.07em;color:#606978;}\n.bill-summary .total-row{font-size:11px;}\n.bill-summary .grand{margin-top:4px;padding-top:14px;font-size:15px;}\n.advanced-fields{grid-column:1/-1;border:1px solid #cfd5de;border-radius:14px;background:#eef1f5;overflow:hidden;}\n.advanced-fields summary{list-style:none;cursor:pointer;display:flex;align-items:center;justify-content:space-between;gap:14px;padding:14px 16px;font-weight:800;color:#303743;}\n.advanced-fields summary::-webkit-details-marker{display:none;}\n.advanced-fields summary span{display:flex;align-items:center;gap:8px;}\n.advanced-fields summary small{font-weight:500;color:#727b89;}\n.advanced-fields[open] summary{border-bottom:1px solid #cfd5de;}\n.advanced-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px;padding:16px;}\n@media(max-width:820px){.modern-bill-body{grid-template-columns:1fr!important}.quick-fields{grid-template-columns:1fr 1fr}.quick-fields label:first-child{grid-column:1/-1}.modern-items,.bill-summary{grid-column:1!important}.bill-summary{position:static}.advanced-grid{grid-template-columns:1fr 1fr}}\n@media(max-width:520px){.quick-fields,.advanced-grid{grid-template-columns:1fr}.quick-fields label:first-child{grid-column:auto}.advanced-fields summary{align-items:flex-start;flex-direction:column}.modern-bill-body{padding:12px!important}}\n</style>\n'''
          html = html.replace('</head>', css + '</head>', 1)
          path.write_text(html, encoding='utf-8')
          PY
      - name: Commit simplified bill entry
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Simplify Add Bill into modern quick-entry flow"
          git push
