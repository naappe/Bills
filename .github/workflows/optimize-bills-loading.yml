name: Optimize Bills Loading

on:
  push:
    branches: [main]
    paths:
      - '.github/workflows/optimize-bills-loading.yml'

permissions:
  contents: write

jobs:
  optimize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch initial and background loading
        shell: python
        run: |
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          text = text.replace(
              "const PAGE_SIZE=1000;\n    const BILLS_PER_PAGE=12;",
              "const INITIAL_BILLS_LIMIT=50;\n    const BACKGROUND_BATCH_SIZE=250;\n    const BILLS_PER_PAGE=12;"
          )

          old = """         async function loadBills(){notice('','');els.recordStatus.textContent='Loading bills...';els.filterSummary.classList.toggle('hidden',!isAdmin());if(isAdmin())els.filterSummary.textContent='Loading records from Supabase...';const previousRows=state.rows.slice();let all=[],from=0;try{while(true){if(isAdmin())els.recordStatus.textContent=`Loading records ${(from+1).toLocaleString()} onward...`;const{data:batch,error}=await db.from(TABLE_NAME).select('*').order('id',{ascending:false}).range(from,from+PAGE_SIZE-1);if(error)throw error;const rows=batch||[];all.push(...rows);if(rows.length<PAGE_SIZE)break;from+=PAGE_SIZE}}catch(error){notice('error',`Bills could not load: ${error?.message||'Network request failed'}. Press Refresh to try again.`);if(!previousRows.length){state.rows=[];state.yearRows=[];state.filtered=[];render()}else{els.recordStatus.textContent=`Showing ${previousRows.length.toLocaleString()} previously loaded records`}return}state.rows=all;state.yearRows=all.filter(isThisYear);rebuildVendorCanonicals();renderVendorOptions();applyFilters();$('lastUpdated').textContent=`Updated ${maldivesNow().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false})} MVT`;notice('','')}"""

          new = """         async function loadBills(){notice('','');els.recordStatus.textContent='Loading recent bills...';els.filterSummary.classList.toggle('hidden',!isAdmin());if(isAdmin())els.filterSummary.textContent='Loading the newest records first...';const previousRows=state.rows.slice();let firstBatch=[];try{const{data,error}=await db.from(TABLE_NAME).select('*').order('id',{ascending:false}).range(0,INITIAL_BILLS_LIMIT-1);if(error)throw error;firstBatch=data||[]}catch(error){notice('error',`Bills could not load: ${error?.message||'Network request failed'}. Press Refresh to try again.`);if(!previousRows.length){state.rows=[];state.yearRows=[];state.filtered=[];render()}else{els.recordStatus.textContent=`Showing ${previousRows.length.toLocaleString()} previously loaded records`}return}state.rows=firstBatch;state.yearRows=firstBatch.filter(isThisYear);rebuildVendorCanonicals();renderVendorOptions();applyFilters();$('lastUpdated').textContent=`Updated ${maldivesNow().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false})} MVT`;notice('','');if(firstBatch.length<INITIAL_BILLS_LIMIT)return;setTimeout(()=>loadRemainingBills(firstBatch.length),0)}
    async function loadRemainingBills(from){const all=state.rows.slice();try{while(true){if(isAdmin())els.recordStatus.textContent=`${all.length.toLocaleString()} records ready · loading older bills...`;const{data:batch,error}=await db.from(TABLE_NAME).select('*').order('id',{ascending:false}).range(from,from+BACKGROUND_BATCH_SIZE-1);if(error)throw error;const rows=batch||[];all.push(...rows);if(rows.length<BACKGROUND_BATCH_SIZE)break;from+=BACKGROUND_BATCH_SIZE}state.rows=all;state.yearRows=all.filter(isThisYear);rebuildVendorCanonicals();renderVendorOptions();applyFilters();$('lastUpdated').textContent=`Updated ${maldivesNow().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit',hour12:false})} MVT`}catch(error){els.recordStatus.textContent=`${state.rows.length.toLocaleString()} recent records ready`;notice('error',`Older bills could not finish loading: ${error?.message||'Network request failed'}. Recent bills are still available.`)}}"""

          if old not in text:
              raise SystemExit('Expected loadBills block was not found; no file was changed.')

          path.write_text(text.replace(old, new), encoding='utf-8')
      - name: Commit optimized loader
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet && exit 0
          git commit -m "Optimize Bills initial data loading"
          git push

# Triggered after workflow installation.
