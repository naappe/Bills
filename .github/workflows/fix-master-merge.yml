name: Fix master vendor merge

on:
  workflow_dispatch:
  push:
    paths:
      - '.github/workflows/fix-master-merge.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Patch master merge logic
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          p=Path('master.html')
          s=p.read_text(encoding='utf-8')
          old='''async function mergeSelected(){const target=$(\'mergeTarget\').value.trim(),sources=[...state.selected].filter(n=>n!==target);if(!target||sources.length<1)return;if(!confirm(`Merge ${sources.length} vendor name(s) into "${target}"?`))return;$(\'mergeBtn\').disabled=true;let updated=0;for(const source of sources){const{data,error}=await db.from(TABLE).update({vendor:target}).eq(\'vendor\',source).select(\'id\');if(error){notice(\'error\',`Merge failed for ${source}: ${error.message}`);$(\'mergeBtn\').disabled=false;return}updated+=(data||[]).length}state.selected.clear();$(\'mergeTarget\').value=\'\';notice(\'ok\',`Merged ${sources.length} vendor name(s). Updated ${updated} bill record(s).`);await loadAll()}'''
          new='''async function mergeSelected(){const target=$(\'mergeTarget\').value.trim(),selected=[...state.selected];if(!target||selected.length<2)return;const rowsToUpdate=state.rows.filter(r=>selected.includes(vendorOf(r))&&vendorOf(r)!==target),ids=rowsToUpdate.map(r=>r.id).filter(id=>id!==undefined&&id!==null);if(!ids.length){notice(\'error\',\'No matching bill records were found for the selected vendors. Refresh and try again.\');return}if(!confirm(`Merge ${selected.length} selected vendor name(s) into "${target}"? This will update ${ids.length} bill record(s).`))return;$(\'mergeBtn\').disabled=true;let updated=0;for(let i=0;i<ids.length;i+=200){const batch=ids.slice(i,i+200),{data,error}=await db.from(TABLE).update({vendor:target}).in(\'id\',batch).select(\'id,vendor\');if(error){notice(\'error\',`Merge failed: ${error.message}`);$(\'mergeBtn\').disabled=false;return}updated+=(data||[]).length}await loadAll();const remaining=state.rows.filter(r=>selected.includes(vendorOf(r))&&vendorOf(r)!==target).length;if(remaining){notice(\'error\',`Only ${updated} record(s) updated. ${remaining} still remain. Check database UPDATE policy.`);$(\'mergeBtn\').disabled=false;return}state.selected.clear();$(\'mergeTarget\').value=\'\';renderAll();notice(\'ok\',`Merge complete. ${updated} bill record(s) now use "${target}".`)}'''
          if old not in s:
              raise SystemExit('Old merge function not found')
          p.write_text(s.replace(old,new,1),encoding='utf-8')
          PY
      - name: Commit fix
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add master.html
          git commit -m "Fix vendor merge persistence"
          git push
