name: Build standard dashboard layout

on:
  push:
    paths:
      - '.github/workflows/rebuild-dashboard-standard.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rebuild dashboard source
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('index.html')
          text = path.read_text(encoding='utf-8')

          old = '''      <section class="executive-dashboard hidden" id="dashboardView" aria-label="Executive Bills Dashboard"><div class="dashboard-primary"></div><div class="panel pad"><h2>Top Vendors</h2><p class="muted">Highest vendor totals under the active filter</p><div id="topVendors"></div></div></div><aside class="dashboard-secondary"><div class="panel pad"><h2>Category Breakdown</h2><p class="muted">Spending grouped by bill category</p><div id="categoryDashboard"></div></div><div class="panel pad"><h2>Payment Methods</h2><p class="muted">Cash, transfer, card and other methods</p><div id="paymentDashboard"></div></div><div class="panel pad"><h2>Status Summary</h2><p class="muted">Paid, pending and cancelled totals</p><div id="statusSummary"></div></div></aside></section>'''

          new = '''      <section class="executive-dashboard hidden" id="dashboardView" aria-label="Bills Dashboard">
        <article class="dashboard-card panel pad">
          <div class="dashboard-card-head"><div><h2>Top Vendors</h2><p class="muted">Highest vendor totals under the active filter</p></div><span class="dashboard-badge">Vendors</span></div>
          <div id="topVendors"></div>
        </article>
        <article class="dashboard-card panel pad">
          <div class="dashboard-card-head"><div><h2>Category Breakdown</h2><p class="muted">Spending grouped by bill category</p></div><span class="dashboard-badge">Categories</span></div>
          <div id="categoryDashboard"></div>
        </article>
        <article class="dashboard-card panel pad">
          <div class="dashboard-card-head"><div><h2>Payment Methods</h2><p class="muted">Cash, transfer, card and other methods</p></div><span class="dashboard-badge">Payments</span></div>
          <div id="paymentDashboard"></div>
        </article>
        <article class="dashboard-card panel pad">
          <div class="dashboard-card-head"><div><h2>Status Summary</h2><p class="muted">Paid, pending and cancelled totals</p></div><span class="dashboard-badge">Status</span></div>
          <div id="statusSummary"></div>
        </article>
      </section>'''

          if old not in text:
              raise SystemExit('Current malformed dashboard block was not found')
          text = text.replace(old, new, 1)

          css = '''
    /* Standard analytics dashboard */
    .main{width:100%;max-width:none;padding:24px}
    .stats{gap:14px;margin-bottom:18px}
    .stat{min-height:112px;display:flex;flex-direction:column;justify-content:center}
    .filter-card{margin-bottom:18px}
    .toolbar{grid-template-columns:minmax(360px,1fr) 160px 170px 150px 150px;align-items:center}
    .executive-dashboard{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;align-items:stretch;margin:0}
    .executive-dashboard.hidden{display:none!important}
    .dashboard-card{min-width:0;margin:0;display:flex;flex-direction:column}
    .dashboard-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:14px}
    .dashboard-card-head h2{font-size:17px;margin:0 0 3px}
    .dashboard-card-head .muted{margin:0}
    .dashboard-badge{display:inline-flex;align-items:center;min-height:26px;padding:0 9px;border-radius:999px;background:#ecfeff;color:#155e75;font-size:11px;font-weight:800;white-space:nowrap}
    .dashboard-card .bar-row{grid-template-columns:minmax(0,1fr) 120px;width:100%;margin:9px 0;padding:6px 4px}
    .dashboard-card .bar{height:9px}
    .dashboard-card .bar-meta{white-space:nowrap}
    @media(max-width:1100px){
      .toolbar{grid-template-columns:1fr 1fr}
      .executive-dashboard{grid-template-columns:1fr}
    }
    @media(max-width:700px){
      .main{padding:14px}
      .stats{grid-template-columns:1fr}
      .toolbar{grid-template-columns:1fr}
      .executive-dashboard{gap:14px}
      .dashboard-card{padding:16px}
      .dashboard-card .bar-row{grid-template-columns:minmax(0,1fr) 92px}
    }
'''
          if '/* Standard analytics dashboard */' not in text:
              text = text.replace('</style>', css + '  </style>', 1)

          checks = [
              text.count('id="dashboardView"') == 1,
              text.count('id="topVendors"') == 1,
              text.count('id="categoryDashboard"') == 1,
              text.count('id="paymentDashboard"') == 1,
              text.count('id="statusSummary"') == 1,
              'dashboard-primary' not in text,
              'dashboard-secondary' not in text,
          ]
          if not all(checks):
              raise SystemExit('Dashboard validation failed')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Update documentation
        shell: bash
        run: |
          cat >> README.md <<'EOF'

## Standard analytics dashboard — 2026-07-12

- Rebuilt the dashboard into a balanced two-column desktop grid.
- Removed the malformed empty dashboard column and wasted white space.
- Standardized KPI cards, filters, chart cards, spacing, and responsive breakpoints.
- Tablet and mobile use a clean one-column dashboard.
- No Supabase bill records or schema were changed.
EOF
          cat >> CHANGELOG.md <<'EOF'

## 2026-07-12 — Standard analytics dashboard

### Fixed
- Removed the large empty dashboard area caused by malformed HTML.
- Rebuilt Top Vendors, Category Breakdown, Payment Methods, and Status Summary as aligned analytics cards.
- Standardized desktop, tablet, and mobile spacing.

### Data safety
- No database or bill-data changes.
EOF

      - name: Commit source
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add index.html README.md CHANGELOG.md
          git commit -m "Build standard aligned analytics dashboard"
          git push
