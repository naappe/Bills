<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="theme-color" content="#0f766e">
<title>White Saffron — Offline</title>
<style>
:root{color-scheme:light dark;font-family:Inter,system-ui,sans-serif}
*{box-sizing:border-box}
body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#fbf8f2;color:#1b1d1a}
main{width:min(520px,100%);padding:40px;border:1px solid #d8d2c8;border-radius:24px;background:#fffdf9;text-align:center;box-shadow:0 18px 50px rgba(27,29,26,.08)}
.logo{width:72px;height:72px;margin:auto;display:grid;place-items:center;border-radius:20px;background:#c79200;color:#fff;font:700 24px Fraunces,Georgia,serif}
h1{font:600 36px Fraunces,Georgia,serif;margin:24px 0 12px}
p{line-height:1.6;color:#59635d}
button{margin-top:18px;border:0;border-radius:12px;padding:13px 20px;background:#0f766e;color:#fff;font-weight:700;cursor:pointer}
@media(prefers-color-scheme:dark){body{background:#111c26;color:#f2f7fa}main{background:#1b2935;border-color:#304554}p{color:#a7b5c0}}
</style>
</head>
<body><main><div class="logo">WS</div><h1>You are offline</h1><p>The White Saffron software is installed, but live bills and supply records need a connection to Supabase. Reconnect and try again.</p><button onclick="location.reload()">Try again</button></main></body>
</html>
